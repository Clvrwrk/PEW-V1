flags:
  - id: hail-resistant-siding-claim
    severity: warning
    message: |
      Fiber-cement and some engineered wood are marketed as hail-resistant.
      Do NOT claim specific impact-resistance ratings (Class 3, Class 4)
      without Chris confirming the specific products Pro Exteriors installs.
      Use directional language: "more durable than vinyl in hail-prone areas."

