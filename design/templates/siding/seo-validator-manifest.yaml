# aia4-seo-validator manifest — Residential Siding Installation
# Phase 1 · 2026-05-03

target_keyword:
  keyword: "siding installation"
  search_volume: 12100
  cpc_usd: 21.79
  competition: LOW
  read: |
    12,100 national volume at LOW competition and $21.79 CPC. Strong conversion
    signal — homeowners searching "siding installation" have already decided on
    new siding and are evaluating contractors. The storm-damage cross-sell angle
    (siding + roofing on the same job) is unoccupied territory in this category —
    competitors treat siding as a standalone trade, not as a storm-recovery
    package. Pro Exteriors' roofing credentialing transfers authority to siding
    in a way pure siding contractors can't match.

