hail_resistant_copy_gate:
  - gate: "no-unconfirmed-impact-resistance-ratings"
    rule: |
      Do NOT claim specific impact resistance ratings (Class 3, Class 4) for any
      siding product without Chris confirming the specific products Pro Exteriors
      installs. Permitted: 'more durable than vinyl in hail-prone areas' or
      'fiber cement holds up better to hail impact than standard vinyl.'
      Blocked: 'Class 4 impact-resistant siding' (unqualified product claim).

