bundle_band:
  id: "bundle"
  eyebrow: "FULL EXTERIOR BUNDLE"
  h2: "Roof. Gutters. Siding. One Crew. One Claim."
  body: |
    Storm events don't respect trade boundaries. Wind and hail that blow through
    a neighborhood damage roofs, gutters, and siding in the same 20-minute window —
    and insurance adjusters want documentation of all three systems at the same
    time. Separating the trades means separate claim supplements, separate
    mobilization costs, and a homeowner coordinating three different contractor
    schedules.

    Pro Exteriors handles the full exterior on a single project scope. A
    <a href="/residential/roof-replacement">roof replacement</a>, seamless gutter
    installation, and siding replacement — one contract, one insurance claim, one
    crew pulling the full scope. If you're working through a
    <a href="/residential/storm-damage-repair">storm damage claim</a>, we document
    all three systems during the initial inspection so nothing gets missed.

    If you're adding gutters to the siding project, see our
    <a href="/residential/seamless-gutters">seamless gutter installation</a> page
    for what that scope includes.
  image_slot:
    alt: "Pro Exteriors crew completing a combined exterior project — roofing, siding, and gutter installation"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

faq:
  eyebrow: "FREQUENTLY ASKED"
  h2: "Siding Installation Questions, Answered."
  items:
    - q: "Can I replace siding and roofing at the same time?"
      a: |
        Yes, and in most storm-damage scenarios it's the right call. When wind
        or hail damages both the roof and the siding, documenting and replacing
        both systems on the same job scope has three practical advantages: one
        mobilization fee instead of two, a single insurance claim covering both
        line items, and a consistent installation timeline without a gap between
        the roofing and siding crews.

        The sequencing is always roofing first, siding second — so the new
        roofline is established before the siding trim and flashing work is
        completed at the eaves.

    - q: "What is the most durable siding material for hail-prone areas?"
      a: |
        For homes in active hail zones — parts of Texas, Colorado, Kansas,
        and Missouri — fiber-cement siding (HardiePlank and similar products)
        is more durable than standard vinyl. Fiber cement is significantly
        harder and holds up better to impact from hailstones and wind-driven
        debris than vinyl, which can dent or crack under large hail.

        That said, not every property in every state needs fiber cement — if
        you're in an area with moderate hail frequency and the insurance
        replacement is covering vinyl, that may be the right economic choice.
        We'll give you a direct assessment during the estimate visit.

    - q: "Does homeowners insurance cover storm-damaged siding?"
      a: |
        In most standard homeowner policies, yes — siding damage caused by a
        covered storm event (hail, wind, tornado) is included in the claim
        settlement. The key is that the damage needs to be documented before
        the claim closes. If your adjuster has already been out for the roof
        and didn't inspect the siding, a supplement can often be filed before
        settlement.

        We document siding condition alongside roofing at every storm-damage
        assessment — nothing gets left off the initial inspection. For the
        full claim coordination process, see our
        <a href="/residential/insurance-claim-assistance" class="underline hover:no-underline">insurance claim assistance</a>
        page.

    - q: "How long does siding installation take?"
      a: |
        A whole-home siding replacement on a standard residential property
        typically runs 2–5 days depending on the square footage, the material
        selected (fiber cement takes longer to install than vinyl), and whether
        substrate repairs are needed. A partial replacement — one elevation,
        or storm-damaged sections only — is typically 1–2 days.

        When combined with a roof replacement, the combined project runs 4–8
        days depending on scope. We give you a specific timeline at the
        estimate visit, not a range.

