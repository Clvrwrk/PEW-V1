service_overview:
  eyebrow: "ONE CONTRACTOR, FULL EXTERIOR"
  h2: "Storm Events Don't Pick Favorites. Wind and Hail Hit the Roof and the Siding at the Same Time."
  body: |
    When a hail storm or high-wind event damages a home, the siding and the roof
    absorb the same event. Most homeowners separate the trades — roofing contractor
    first, siding contractor later — because that's how the industry is typically
    organized. The result is two mobilizations, two insurance line items, two
    inspection visits, and two scheduling windows.

    Pro Exteriors handles both. As a licensed residential exterior contractor
    across Texas, Colorado, Kansas, Missouri, and Georgia, we scope and install
    siding replacements alongside roof work on the same job — or as a standalone
    project for homeowners upgrading a home that wasn't storm-damaged.

    The material options are fiber cement (fiber-cement siding like HardiePlank is
    the most durable option in hail-prone areas — it holds up to impact better than
    standard vinyl and doesn't require repainting as frequently), vinyl (the
    standard cost-effective choice for most planned upgrades and insurance
    replacements), and engineered wood (for homeowners who want a wood-look
    appearance without the maintenance of real wood). We'll walk through which
    material makes sense for your project during the free assessment.
  cta:
    label: "Get a Free Siding Assessment"
    href: "/contact?intent=siding-assessment&source=siding-overview"
    data_event_action: "cta-click"
    data_event_label: "overview-cta"
    data_event_category: "siding"
  image_slot:
    alt: "Completed fiber-cement siding installation on a Texas home — Pro Exteriors project"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

materials_grid:
  eyebrow: "SIDING MATERIALS"
  h2: "Three Materials. Different Applications."
  cards:
    - id: "fiber-cement"
      icon: "shield"
      h3: "Fiber-Cement Siding"
      body: "The most durable residential siding option for homes in hail-prone areas. Fiber cement — HardiePlank is the most widely specified brand — is significantly harder than vinyl and holds up better to impact damage from hail and wind-driven debris. It's paintable, available in a broad range of profiles, and resists moisture, rot, and pests. Higher material cost than vinyl; lower long-term maintenance cost."
      badge: "Best for Hail Zones"
    - id: "vinyl"
      icon: "home"
      h3: "Vinyl Siding"
      body: "The standard replacement material for most residential storm-damage claims and planned upgrades. Lower upfront cost than fiber cement, available in a wide color range, and requires no painting. In moderate-hail areas, vinyl performs well. In high-frequency hail zones (parts of TX, CO, KS), fiber cement is the more durable choice — we'll tell you which applies to your property."
      badge: "Most Common"
    - id: "engineered-wood"
      icon: "tree"
      h3: "Engineered Wood Siding"
      body: "For homeowners who want a wood-grain appearance without the maintenance of real wood siding. Engineered wood products (LP SmartSide is the most widely installed) are manufactured with resins that resist moisture and pests better than natural wood. Available in lap, panel, and trim profiles. A middle-ground option between vinyl's affordability and fiber cement's durability."
      badge: "Wood Look"

