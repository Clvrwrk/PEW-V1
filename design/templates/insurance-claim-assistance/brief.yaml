# Insurance Claim Assistance — Page Build Brief
# Written by aia4-pagebuilder Phase 0 on 2026-05-03
# Low-volume but zero-competition, unrebutted positioning territory

slug: insurance-claim-assistance
template: residential-service
location: null
target_keyword: "insurance claim roof damage"
secondary_keywords:
  - "roof insurance claim"
  - "insurance claim roofing contractor"
  - "storm damage insurance claim roof"
  - "hail damage insurance claim"
  - "insurance deductible roof repair"
  - "roof claim process"
audience: residential-homeowner
intent: solution-aware                 # Homeowner has damage; is researching the claim process before choosing contractor
hypothesis: |
  Insurance claim handling is an unrebutted positioning territory — competitors
  barely mention it (cluster mean ~0.6 per the residential pillar SEO audit),
  yet the "insurance claim roof" keyword cluster reflects a high-anxiety, high-
  intent search by homeowners immediately after storm events. A dedicated page
  that walks the homeowner through the exact claim process (adjuster, estimate
  matching, supplement filing, direct pay) and positions Pro Exteriors as the
  advocate — not just the installer — will:
    (a) capture the insurance-claim long-tail cluster (including "roof claim
        process", "storm damage insurance claim roof") with minimal competition
        over 6 months; AND
    (b) drive ≥35% form completion on 'Get a Free Damage Assessment' CTA
        within 90 days — highest conversion hypothesis in the silo because
        homeowners searching this keyword have already decided they have
        damage, they just need an advocate.

