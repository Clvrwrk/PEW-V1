flags:
  - id: legal-compliance-insurance-claims
    severity: critical
    message: |
      Insurance claim advocacy copy must be legally accurate. Do NOT imply
      Pro Exteriors acts as a licensed public adjuster (unless they are).
      The framing is "we coordinate with your adjuster" and "we help you
      understand the estimate" — NOT "we file the claim for you" or "we
      negotiate your settlement." Copywriter must flag any language that
      could be construed as unlicensed public adjusting. Chris must review
      this page's copy before ship.
  - id: deductible-assistance
    severity: warning
    message: |
      Some roofing contractors offer to waive or absorb insurance deductibles.
      This practice is illegal in several states (TX, FL, CO among others).
      Page must NOT promise deductible assistance or absorption. The Figma
      financing band on the residential pillar mentions "Insurance Deductible
      Assistance" — if that refers to financing the deductible via a third-
      party lender, that's fine; if it implies Pro Exteriors absorbs it,
      that is a legal red flag. Clarify with Chris before this language ships.

