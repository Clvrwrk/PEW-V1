faq:
  eyebrow: "FREQUENTLY ASKED"
  h2: "Roof Insurance Claim Questions, Answered."
  items:
    - q: "Does Pro Exteriors work directly with my insurance company?"
      a: |
        Yes — within a defined scope. We document your damage, coordinate the adjuster
        inspection, review the carrier's estimate, and file supplement requests when
        the initial estimate is incomplete. We communicate with your carrier in writing
        on anything that relates to the scope of the physical work.

        What we do not do is file your claim or negotiate your settlement. Those
        activities require a public adjuster license. Our role is as your contractor —
        we make sure the scope of work is documented completely, and we make sure the
        carrier's estimate reflects what it actually costs to fix your roof to code.
        Your carrier issues the claim check; you pay us from those proceeds.

    - q: "What if the insurance company denies my claim or undervalues the damage?"
      a: |
        Partial payments and scope disputes are common and usually addressable. When
        the adjuster's estimate misses line items — decking allowance, drip edge, code-
        required ventilation upgrades, ice-and-water shield — we prepare a supplement
        request with documentation and file it with your carrier.

        A full denial is less common but does happen. In that case, your options are to
        request a re-inspection with additional documentation, invoke your policy's
        appraisal clause (which typically involves a licensed public adjuster on each
        side), or pursue the claim independently. We cannot file an appeal on your behalf
        — that is a legal action that requires either your direct involvement or a
        licensed public adjuster. We can provide the documentation you or your adjuster
        needs to make that case.

    - q: "Will I owe anything out of pocket?"
      a: |
        Your insurance deductible is your responsibility — it is the portion of the
        claim your policy requires you to pay directly. We do not waive, absorb, or
        offset deductibles. Any contractor offering to 'cover your deductible' is
        likely violating state law in Texas, Colorado, and several of the other states
        we operate in. That practice also frequently constitutes insurance fraud.

        Beyond the deductible, what you owe depends on what your carrier approves.
        If the approved scope matches the actual work, your out-of-pocket cost is the
        deductible only. If there are upgrades you want beyond what insurance covers —
        a material upgrade from standard 3-tab to architectural shingles, for example —
        those are out-of-pocket additions you control.

    - q: "How long does the roof insurance claim process take?"
      a: |
        Timeline varies by carrier and claim complexity. A straightforward claim in a
        low-storm-volume period can move from inspection to installation in three to
        four weeks. In a high-volume event year — after a major hail storm that affects
        thousands of homes — carrier response times and scheduling backlogs can extend
        that to six to ten weeks or longer.

        The steps we control: we conduct your damage assessment within 24–48 hours of
        contact, attend the adjuster inspection at whatever time the carrier schedules,
        and file any supplement requests within five business days of receiving the
        adjuster's estimate. If the project requires a <a href="/residential/roof-replacement">full roof replacement</a>,
        installation typically runs one to two days once the claim is approved and the
        project is on the schedule. We communicate every status change the day it occurs.
        Storm damage can also be addressed with temporary protection while the claim
        processes — see our
        <a href="/residential/storm-damage-repair">storm damage repair</a> page
        for emergency options.

