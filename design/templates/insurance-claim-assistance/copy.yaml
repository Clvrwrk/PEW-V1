service_overview:
  eyebrow: "YOU SHOULDN'T HAVE TO MANAGE THIS ALONE"
  h2: "After a Storm, the Insurance Process Is a Second Job. We Handle Our Part of It."
  body: |
    A roof insurance claim involves a free inspection, damage documentation, adjuster
    scheduling, estimate review, and — more often than most homeowners expect — a
    supplement filing when the initial payout doesn't cover the full scope of work. Most
    homeowners navigate this once in a lifetime. We navigate it every week.

    What Pro Exteriors does in a storm-damage claim: we conduct a free damage assessment
    and document every element of the loss with photos and written notes. We coordinate
    the adjuster inspection schedule and attend the adjuster's visit so you're not
    standing on your roof alone with someone whose job it is to keep the claim check as
    small as defensible. When the adjuster's estimate misses line items or undervalues
    the scope, we identify the gap and file a supplement request with your carrier —
    directly and in writing.

    What we do not do: we do not file your claim on your behalf, and we do not negotiate
    your settlement. Those activities require a public adjuster license we do not hold.
    What we do is make sure that the contractor's scope of work is documented completely
    and that your carrier has everything it needs to pay for that scope. Our
    <a href="/residential">residential roofing contractors</a> operate in all five states
    we serve and understand the carrier preferences, adjuster relationships, and local
    code requirements that affect how a claim gets settled in each market.
  image_slot:
    alt: "Pro Exteriors project manager reviewing insurance adjuster estimate with homeowner at a kitchen table"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

claim_process:
  id: "process"
  eyebrow: "OUR PROCESS"
  h2: "Free Assessment to Final Settlement — Five Steps."
  subhead: "This is what a Pro Exteriors insurance claim looks like from day one to install complete."
  steps:
    - number: 1
      title: "Free Damage Assessment & Photo Documentation"
      body: "A Pro Exteriors crew member inspects every element of storm impact — shingle field, ridge, flashing, gutters, fascia, and any interior water intrusion — and produces a written damage summary with timestamped photos. This document is what your insurance carrier needs to open the claim."
      icon: "search"
    - number: 2
      title: "Adjuster Coordination"
      body: "We coordinate the adjuster's inspection visit with your schedule and attend the inspection in person. We bring our documentation, walk the roof alongside the adjuster, and make sure every damage item we identified is visible and on record during the visit."
      icon: "calendar"
    - number: 3
      title: "Estimate Review & Supplement Filing"
      body: "We review the adjuster's written estimate against the actual scope of work. When line items are missing, underpriced, or omit required code upgrades, we prepare a supplement request and file it directly with your carrier. Supplements are normal — they are how the insurance process self-corrects."
      icon: "file-text"
    - number: 4
      title: "Approval — Schedule Installation"
      body: "Once the claim is approved for the full scope, we schedule your installation. If a partial approval is issued first, we communicate the status, explain what's pending, and do not begin installation until the scope is resolved."
      icon: "check-circle"
    - number: 5
      title: "Final Walkthrough & Settlement Confirmation"
      body: "At project completion, we walk the finished installation with you, confirm site cleanup, and provide documentation of the completed work for your records and for your carrier's final settlement file."
      icon: "home"
  cta:
    label: "Get Your Free Damage Assessment"
    href: "/contact?intent=damage-assessment&source=insurance-claim-process"
    data_event_action: "cta-click"
    data_event_label: "process-cta"
    data_event_category: "insurance-claim-assistance"

what_we_handle:
  eyebrow: "WHAT THIS COVERS"
  h2: "Three Things Most Homeowners Don't Know to Ask About."
  subhead: "The gap between what your insurance pays and what your roof actually costs often comes down to whether your contractor knows how to do these three things."
  cards:
    - id: "adjuster-coordination"
      icon: "users"
      h3: "Adjuster Coordination"
      body: |
        The adjuster works for your insurance carrier. Our project manager attends
        the inspection because a contractor who knows what they're looking at can
        point to damage the adjuster might miss from a fast pass. We don't argue
        with adjusters — we document everything and let the evidence speak.
    - id: "estimate-matching"
      icon: "clipboard"
      h3: "Estimate Review"
      body: |
        Insurance estimates are generated from carrier software that doesn't always
        reflect current material costs, local labor rates, or code-required upgrades.
        We review every line item and flag the gaps before installation begins —
        not after, when the change-order conversation is harder.
    - id: "supplement-filing"
      icon: "file-plus"
      h3: "Supplement Filing"
      body: |
        A supplement request is a formal written request to the carrier to cover
        scope that was missed or undervalued in the original estimate. Supplements
        are a standard part of the claims process — most carriers have a defined
        procedure for them. We file the paperwork; you stay out of it.

