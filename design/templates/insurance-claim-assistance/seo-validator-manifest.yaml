# aia4-seo-validator manifest — Insurance Claim Assistance
# Phase 1 · 2026-05-03

target_keyword:
  keyword: "insurance claim roof damage"
  search_volume: 1900
  cpc_usd: 9.40
  competition: LOW
  read: |
    Low volume, but the intent is the highest-urgency in the residential silo —
    homeowners actively dealing with storm damage and navigating the insurance process.
    Competitors virtually ignore this cluster (brief: mean ~0.6 mentions per page).
    A dedicated, expert page owns this territory by default. Conversion hypothesis
    (≥35% form-completion) is the highest in the silo precisely because the searcher
    has already decided they have damage; the decision is which contractor to trust
    with the process. Page should lead with credibility and process transparency, not
    a sales pitch.

