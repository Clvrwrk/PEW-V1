legal_copy_gates:
  - gate: "no-public-adjuster-claim"
    rule: |
      NEVER write copy implying Pro Exteriors files the insurance claim, negotiates the
      settlement, or acts as a licensed public adjuster. Permitted: 'we coordinate with
      your adjuster,' 'we attend the adjuster inspection,' 'we document damage,' 'we help
      you understand the estimate,' 'we file supplement requests directly with your carrier.'
      Blocked: 'we file your claim,' 'we negotiate your payout,' 'we work to maximize your
      settlement,' 'let us handle everything with your insurance company.'
  - gate: "no-deductible-absorption"
    rule: |
      NEVER promise or imply Pro Exteriors absorbs, waives, or offsets the homeowner's
      deductible. Illegal in TX, CO, and multiple other states. Financing via a third-party
      lender that covers the deductible is permissible IF Pro Exteriors confirms they offer
      this and who the lender is. Until confirmed, all deductible language must be:
      'your deductible is your responsibility' or omit deductible entirely.

