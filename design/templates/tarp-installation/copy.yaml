what_tarping_does:
  eyebrow: "WHY TARPING MATTERS"
  h2: "A Tarp Stops the Clock on Interior Damage. Every Hour Without One Costs More."
  body: |
    Active water intrusion through a damaged roof is not a "fix it next week" problem.
    Water travels. From the breach point, it moves through insulation, into ceiling
    joists, down into wall cavities, and eventually onto floors and into subfloor
    assemblies. Secondary damage from a delayed tarp — mold growth, structural rot,
    damaged electrical, ruined finishes — routinely exceeds the original roof repair
    cost by a significant margin.

    Emergency tarping provides temporary weather protection from the roof breach until
    permanent repairs can be planned and scheduled. It also documents the breach
    location for your insurance claim — a professional tarp installation with photos
    is far better insurance documentation than a homeowner-applied tarp or no tarp at all.

    This service is available as a standalone — it is not contingent on committing to
    a permanent repair with Pro Exteriors.
  contact_block:
    heading: "Roof breached? Call now."
    phone_display: "[REPRESENTATIVE]"
    phone_href: "tel:[REPRESENTATIVE]"
    cta_label: "Submit Online"
    cta_href: "/contact?intent=emergency-tarp&source=tarp-installation-overview"
