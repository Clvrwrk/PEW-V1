next_steps_band:
  eyebrow: "AFTER THE TARP"
  h2: "Tarping Stops the Damage. These Are Your Permanent Repair Options."
  body: |
    Emergency tarping is the first step, not the last. Once the active leak is stopped,
    the path forward depends on the extent of the damage.

    Isolated damage from a tree impact or a localized storm breach may be addressable
    with a targeted <a href="/residential/storm-damage-repair">storm damage repair</a>.
    Widespread hail field damage or a roof more than 20 years old may make a
    <a href="/residential/roof-replacement">permanent roof replacement</a> the more
    economic choice. And if the event was hail-driven,
    <a href="/residential/hail-damage-repair">hail damage assessment</a> should happen
    before any permanent repair is scoped.

    Either way, <a href="/residential/insurance-claim-assistance">insurance claim
    coordination</a> is included in every permanent repair we do — from the adjuster
    inspection to the supplement filing.
  image_slot:
    alt: "Pro Exteriors crew beginning permanent roof repair after emergency tarp removal"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

faq:
  eyebrow: "FREQUENTLY ASKED"
  h2: "Emergency Roof Tarp Questions, Answered."
  items:
    - q: "How long will the tarp stay in place?"
      a: |
        A correctly installed heavy-duty roof tarp provides temporary weather protection
        until permanent repairs can be scheduled and completed. We do not make specific
        duration claims because tarp longevity depends on your weather conditions, wind
        exposure, and roof geometry. The goal is to get your permanent repair on the
        schedule as quickly as possible — not to live indefinitely under a tarp.

        For most projects, permanent repair or replacement can be scheduled within one
        to three weeks of the tarp installation, depending on material lead times,
        permit issuance (where required), and insurance claim processing.

    - q: "Will tarping prevent all water damage?"
      a: |
        A tarp stops active water intrusion through the breach it covers. It does not
        reverse damage that has already occurred, and it does not protect areas that
        were not covered. After we install the tarp, we will tell you what areas of
        the roof it covers and what, if any, exposure points remain.

        If you are seeing water inside the home from a location that doesn't match the
        breach we covered, the water may be traveling — running along a rafter or down
        a wall cavity from a secondary breach point. Interior water damage should be
        documented immediately with your own photos for insurance purposes.

    - q: "Does insurance cover emergency tarping?"
      a: |
        In most standard homeowner policies, yes — emergency tarping is considered a
        reasonable mitigation action to limit further damage after a covered storm event.
        Most carriers will include tarping costs in the claim settlement when the
        underlying damage is covered.

        We document the tarp installation with the same photographic and written record
        we use for permanent repair insurance claims. That documentation goes to you
        and, if you choose, to your insurance adjuster. See our
        <a href="/residential/insurance-claim-assistance" class="underline hover:no-underline">insurance claim assistance</a>
        page for the full process breakdown.

    - q: "How soon can Pro Exteriors arrive after I call?"
      a: |
        We aim to have a crew on-site within 24–48 hours of contact in standard
        conditions. In high-volume storm events that affect thousands of homes in a
        short window — a major hail corridor, a tornado touchdowns pattern — response
        windows extend. We triage by severity of active intrusion and tell you the
        current response window honestly when you call.

        The fastest path to getting on our schedule is a phone call. Our online form
        is a fallback for when the line is busy.

