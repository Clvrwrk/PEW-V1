    severity: critical
    message: |
      Same as storm-damage-repair: this page is opened mid-emergency. No hero
      video. LCP must be H1 + phone CTA. Defer all non-critical images. Target
      LCP <1.0s on 4G (tighter than CLAUDE.md §4 floor of <1.5s because this
      is an emergency-response page).
  - id: phone-as-primary-cta
    severity: warning
    message: |
      This is the ONE page in the silo where phone should be the PRIMARY CTA,
      not a secondary. Form submission is a fallback. Hero must have a tel:
      link that triggers the native phone dialer. Do not bury it below the fold.
      Requires [REPRESENTATIVE] phone number until Chris provides the actual IVR
      routing number.
  - id: tarp-longevity-claims
    severity: info
    message: |
      Do NOT make specific claims about tarp lifespan ("lasts 3 months,"
      "good for one rainy season") without Chris confirming Pro Exteriors'
      actual product specs. Use directional language: "temporary protection
      until permanent repairs can be scheduled."

