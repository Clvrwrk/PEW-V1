# ─── Hard-block summary ───
ship_blocked_count: 7   # hero-bg, service-overview-right, logo-gaf, logo-owens-corning, testimonial-project, case-tx, case-co, case-ks
ship_blocked_reason: |
  7 of 13 slots are ship-blocked because:
    (a) Hero requires real Pro Exteriors photography (largest CLS/LCP risk)
    (b) Both manufacturer logos require permission confirmation before display
    (c) Case studies and testimonial require real project content and customer release
  The remaining 6 slots (materials cards, warranty left, final-cta bg) can
  render with tasteful placeholder treatments (icon + color band) and are
  NOT ship-blocking if real photos are unavailable at launch. They ship with
  [REPRESENTATIVE] placeholder paths and should be backfilled within 30 days.

# ─── Image optimization spec (applies to all slots) ───
optimization:
  format: "WebP primary, JPEG fallback via <picture>"
  hero_lcp: "Compress to <120KB WebP. loading='eager' fetchpriority='high'. No lazy."
  all_others: "loading='lazy'. Compress to <80KB WebP for cards, <200KB for SplitIntro panels."
  responsive_srcset: "Minimum: 400w, 800w, 1200w variants for hero. 400w, 800w for all others."
  no_cls: "Always specify explicit width/height attributes on <img> to prevent CLS."

status: success
