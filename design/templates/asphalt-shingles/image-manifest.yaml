# aia4-image-gen manifest — Asphalt Shingle Roofing service page
# Phase 3 deliverable. Image strategy and slot inventory.
# Per CLAUDE.md §9: no stock photography, no generated rooftop photos.
# Every slot is [REPRESENTATIVE — NOT YET SOURCED] until Chris supplies real
# Pro Exteriors project photos from /brand-assets/client/ or Google Drive.

strategy: real-photography-only
rationale: |
  CLAUDE.md §9 hard rule: "Never use stock photography of diverse smiling team
  in hard hats — every image is real Pro Exteriors work or it doesn't ship."
  AI-generated rooftop images also prohibited (cannot verify they match Pro
  Exteriors' actual work or geographic markets).
  All slots below are placeholder paths. Phase 5 page-qc blocks ship if any
  slot still holds a placeholder at launch time.

# ─── Image slot inventory (13 total) ───
image_slots:

  # SLOT 1 — Hero background
  - slot_id: hero-bg
    section: hero
    path_placeholder: "/images/placeholders/hero-asphalt-shingles.jpg"
    alt: "Pro Exteriors crew installing architectural asphalt shingles on a residential roof"
    usage: "Full-bleed hero behind 40% dark overlay. LCP image — must use loading='eager' fetchpriority='high'."
    spec: |
      Preferred: wide-angle aerial or near-aerial showing crew actively working on
      a shingle roof. Shows work quality and scale. Any of the 5 served states.
      Minimum: 1920×1080 original. Compress to WebP <120KB for LCP target.
    source_required: true
    ship_blocked: true

  # SLOT 2 — Service overview (SplitIntro image-right)
  - slot_id: service-overview-right
