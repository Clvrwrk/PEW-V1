# ─── SERP analysis ───
serp_read: |
  Top 25 SERP for "asphalt shingle roofing" (2026-05-03):
  Manufacturers: GAF (rank 3), CertainTeed (rank 4), Owens Corning (rank 8)
  Retailers: Home Depot (rank 2), Menards (rank 9), ABC Supply (rank 11, 19)
  Informational: Wikipedia (rank 10), ARMA (rank 12), Angi (rank 24)
  Cost guides: Modernize (rank 20)
  No contractor money pages in top 25.

  STRATEGIC IMPLICATION: There is no contractor SERP cluster to benchmark TF
  against — this keyword is effectively uncontested for contractor money pages.
  Pro Exteriors entering this SERP with a well-structured contractor service page
  (matching the transactional intent with "free inspection" + credentials) can
  rank within 90 days because the SERP lacks exactly that content type.

  TF targets below use manufacturer content patterns (what Google considers
  authoritative for this topic) + contractor-specific additions (inspection,
  contractor, multi-state) that are absent from manufacturer pages.

# ─── Term-frequency targets ───
term_frequency_targets:
  "asphalt shingle roofing":
    target_range: "5–8"
    placement: "Title (1), H1 (1), meta (1), first 100 words (1), ≥2 more in body"
    read: "Exact-match primary. Sparse SERP means no cluster to beat — target the conversion intent, not the cluster average."

  "asphalt shingles":
    target_range: "15–25"
    read: "Volume driver at 49,500. Highest-frequency body term. Natural in materials section, process, FAQs."

  shingles:
    target_range: "30–45"
    read: "Core stem. Every section mentions shingles naturally."

  roofing:
    target_range: "20–35"
    read: "Core category term."

  roof:
    target_range: "20–30"
    read: "Noun form alongside 'roofing'."

  architectural:
    target_range: "8–12"
    read: "33,100-volume informational secondary. Materials section drives this naturally."

  "3-tab":
    target_range: "5–8"
    read: "22,200-volume comparison term. Materials comparison section."

  dimensional:
    target_range: "3–5"
    read: "Synonym for architectural — use interchangeably to avoid over-repetition."

  gaf:
    target_range: "5–8"
    read: "Manufacturer credential anchor. Trust strip, manufacturers band, warranty section."

  "owens corning":
    target_range: "3–5"
    read: "Second manufacturer credential."

  "master elite":
    target_range: "2–3"
    read: "Key Pro Exteriors credential — only 2% of contractors hold this."

  warranty:
    target_range: "8–12"
    read: "Major differentiator. Manufacturer warranties + workmanship warranty + transfer."

  installation:
    target_range: "10–15"
    read: "Core service term. Process section drives this."

  replacement:
    target_range: "6–10"
    read: "Captures 'shingle roof replacement' secondary."

  contractor:
    target_range: "5–8"
    read: "Positions the page as a contractor page vs manufacturer page — essential for conversion."

  inspection:
    target_range: "5–8"
    read: "CTA and process anchor."

  hail:
    target_range: "3–5"
    read: "Hail-belt geographic positioning. FAQ + materials section."

  geographic_state_moats:
    target_range: "Each state 2–4×; 'five states' phrasing 1–2×"
    read: "Same geo-moat strategy as the residential pillar."

# ─── Schema types required ───
schema_types_required:
  - type: RoofingContractor
    required: true
    placement: "Page-level JSON-LD. Maps Pro Exteriors entity. hasOfferCatalog includes asphalt shingle service."
  - type: Service
    required: true
    placement: "Specific block for asphalt shingle roofing service. serviceType, provider, areaServed (5 states)."
  - type: BreadcrumbList
    required: true
    placement: "Home > Residential Roofing > Asphalt Shingle Roofing"
  - type: FAQPage
    required: true
    placement: "Wraps all 4 FAQ items."

# ─── Flags ───
flags:
  - id: no-contractor-serp-competition
    severity: info
    message: |
      Uncontested territory for a contractor money page on this keyword.
      Rank within 90 days is realistic with correct on-page structure.
      Do not try to compete with manufacturer content — different intent.
      Focus on the contractor-specific intent: who should install, why
      Pro Exteriors, what the process looks like, what the warranties are.
  - id: gaf-master-elite-verification
    severity: warning
    message: |
      GAF Master Elite is a verified Pro Exteriors credential (appears on
      Figma trust strip for the residential pillar). Confirm Chris has not
      changed credentialing status before this ships. Master Elite allows
      issuance of the Golden Pledge warranty — this is a major differentiator.
  - id: cost-claims-source
    severity: warning
    message: |
      "Asphalt shingle cost" is a 12,100-volume keyword. FAQ addresses it.
      Any cost ranges MUST be marked [REPRESENTATIVE — NOT YET SOURCED]
      until Chris confirms Pro Exteriors' actual pricing. Industry ranges
      ($3.50–$6.50/sq ft installed) can be cited with source attribution.

