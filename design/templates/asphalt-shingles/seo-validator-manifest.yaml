  search_volume: 40500
  cpc_usd: 3.87
  competition: LOW
  source: DataForSEO Google Ads search_volume/live (US 2840, 2026-05-03)
  read: |
    Strong volume, LOW competition. CPC ($3.87) is lower than the transactional
    variants because this keyword captures both information-seekers and buyers.
    The real conversion anchor is "shingle roofing contractor" ($30.92 CPC,
    LOW comp, 590 vol) — that term must appear in the H1 area and early body.
    "Asphalt shingles" (49,500 vol) is the volume driver in body frequency.

