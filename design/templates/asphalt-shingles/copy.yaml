# ─── FAQ (FAQPage schema) ───
faq:
  eyebrow: "FREQUENTLY ASKED"
  h2: "Your Asphalt Shingle Questions, Answered."
  subhead: null
  items:
    - q: "What is the difference between 3-tab and architectural shingles?"
      a: |
        3-tab shingles are a single layer cut into three flat tabs — uniform,
        lightweight, and affordable. Architectural shingles (also called
        dimensional or laminate shingles) use a double layer of asphalt bonded
        together, which creates a textured, dimensional look and significantly
        better wind and impact resistance. For most residential <a href="/residential/roof-replacement">roof replacements</a>
        in Texas, Colorado, Kansas, Missouri, and Georgia, we recommend
        architectural shingles — the gap in cost is modest and the durability
        improvement is substantial. Read our full <a href="/blog/architectural-vs-3-tab-shingles">architectural vs. 3-tab shingle comparison</a>
        for a deeper breakdown.

    - q: "How long do asphalt shingles last?"
      a: |
        It depends on the product tier. 3-tab shingles typically last 20–25
        years. Architectural shingles run 25–50 years depending on the product
        line and how well the roof is ventilated and maintained. Premium designer
        shingles from GAF and Owens Corning carry lifetime warranties on the
        shingle itself (though prorations apply after a certain age). Installation
        quality has as much impact on actual lifespan as the product specification —
        a premium shingle improperly installed will fail earlier than a mid-grade
        shingle installed correctly. See <a href="/blog/5-signs-replacement">five signs your roof needs replacing</a>
        if you are unsure about your current roof's condition.

    - q: "What does asphalt shingle roofing cost?"
      a: |
        Installed cost varies by shingle tier, roof complexity, square footage,
        tearoff layers, and decking condition. As a directional range,
        3-tab installations run lower than architectural, which run lower than
        premium designer shingles. [REPRESENTATIVE — NOT YET SOURCED: Insert
        Pro Exteriors' confirmed price ranges per shingle tier, or cite a
        sourced industry range with clear attribution (e.g., HomeAdvisor,
        Angi, RS Means data) before this ships.] Every Pro Exteriors job starts
        with a free inspection and a detailed line-item estimate — you will
        know exactly what you are paying for before we pull a permit.
        See <a href="/blog/how-much-does-a-roof-replacement-cost">how much a roof replacement actually costs</a>
        for a framework to evaluate any estimate you receive.

    - q: "Can asphalt shingles withstand hail?"
      a: |
        Standard architectural shingles hold up to moderate hail events.
        For homeowners in Texas, Colorado, and Kansas — where large hail is
        a recurring weather risk — we often recommend Class 4 impact-resistant
        shingles, which have been tested to withstand 2-inch steel ball drops
        per UL 2218 standards. Some insurance carriers in hail-prone states
        offer premium discounts for Class 4 shingles [REPRESENTATIVE —
        verify with Chris whether this is true in Pro Exteriors' served states
        before this sentence ships]. If you have had recent <a href="/residential/hail-damage-repair">hail damage</a>,
        Pro Exteriors can assess whether repair or a full replacement with
        impact-resistant shingles makes more economic sense given your
        insurance coverage.

