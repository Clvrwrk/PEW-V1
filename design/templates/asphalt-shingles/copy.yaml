# ─── Service overview (SplitIntro) ───
service_overview:
  h2: "The Most-Installed Roof in America. Installed the Right Way."
  eyebrow: "WHY ASPHALT SHINGLES"
  body: |
    Roughly three out of four residential roofs in the United States are covered
    in asphalt shingles — and the reason is straightforward. No roofing material
    matches asphalt's combination of cost, durability, and design range. A
    properly installed asphalt shingle roof in Texas or Colorado handles heat,
    hail, and freeze-thaw cycles. A poorly installed one starts failing in year
    three.

    The gap between a good asphalt shingle job and a bad one is almost entirely
    in the installation. At Pro Exteriors, our crews are GAF Master Elite
    certified — a designation fewer than 2% of US roofing contractors hold —
    and Owens Corning Preferred, which means we can register manufacturer
    warranties for our customers on the day the job is done. We serve residential
    homeowners across Texas, Colorado, Kansas, Missouri, and Georgia, and every
    asphalt shingle roofing project starts with a free inspection and a
    detailed line-item estimate before any work begins.
  image_slot:
    alt: "Pro Exteriors crew member carrying a bundle of architectural shingles up a ladder"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"
  credential_badges:
    - "GAF Master Elite Certified"
    - "Owens Corning Preferred Contractor"
    - "2,500+ Roofs Installed [REPRESENTATIVE]"

# ─── Materials grid (BenefitsGrid) ───
materials_grid:
  id: "materials"
  eyebrow: "CHOOSE YOUR SHINGLE"
  h2: "Three Tiers. One Certified Installer."
  subhead: "Not every shingle is right for every home or budget. Here is what each tier delivers and when it makes sense."
  cards:
    - id: "3-tab"
      h3: "3-Tab Shingles"
      body: |
        The entry-level asphalt shingle. Three flat tabs cut to a uniform size give
        a clean, classic look at the lowest cost point. Typical lifespans run 20–25
        years with a manufacturer warranty to match. 3-tab shingles work well for
        rental properties, budget-driven replacements, and homes in lower wind-load
        zones. They are lighter than architectural shingles and require less
        structural support.
      specs:
        - "Lifespan: 20–25 years"
        - "Warranty: 20–25 year manufacturer"
        - "Weight: ~2.0–2.5 lbs/sq ft"
        - "Best for: Budget replacements, rentals"
      image_slot:
        alt: "3-tab asphalt shingles on a residential roof"
        src: "[REPRESENTATIVE — NOT YET SOURCED]"

    - id: "architectural"
      h3: "Architectural Shingles"
      eyebrow: "MOST POPULAR"
      body: |
        Architectural shingles — also called dimensional or laminate shingles —
        are the standard choice for residential roof replacement in 2026. The
        laminated construction creates a textured, layered appearance that mimics
        natural wood shake at a fraction of the cost. Wind resistance is
        significantly better than 3-tab (rated to 110–130 mph depending on the
        product), and warranty coverage stretches to 30–50 years from GAF and
        Owens Corning. If you are replacing a roof in Texas, Colorado, Kansas,
        or Missouri, architectural shingles are almost always the right answer.
      specs:
        - "Lifespan: 25–50 years"
        - "Warranty: 30–50 year manufacturer (GAF, Owens Corning)"
        - "Weight: ~2.8–3.5 lbs/sq ft"
        - "Wind rating: 110–130 mph"
        - "Best for: Standard residential replacement"
      image_slot:
        alt: "Architectural dimensional asphalt shingles installed on a residential home"
        src: "[REPRESENTATIVE — NOT YET SOURCED]"

    - id: "premium"
      h3: "Premium Designer Shingles"
      body: |
        Premium shingles are engineered to simulate the look of natural slate or
        cedar shake without the weight or maintenance. They are the heaviest
        asphalt option and carry the most comprehensive warranties — lifetime
        coverage is available through GAF's Grand Sequoia and Presidential
        Shake lines and Owens Corning's Berkshire Collection. Pro Exteriors'
        GAF Master Elite certification allows us to issue the Golden Pledge
        warranty, GAF's most complete protection, on qualifying premium
        installations. For homeowners who want the durability of a premium
        asphalt product without the complexity of tile or slate, this is the
        category.
      specs:
        - "Lifespan: 40 years to lifetime"
        - "Warranty: Lifetime manufacturer + Golden Pledge available (GAF)"
        - "Weight: varies by product"
        - "Best for: Premium upgrades, distinctive aesthetics"
      image_slot:
        alt: "Premium designer asphalt shingles simulating natural slate on a luxury home"
        src: "[REPRESENTATIVE — NOT YET SOURCED]"

# ─── Manufacturers band ───
manufacturers_band:
  eyebrow: "OUR CERTIFICATIONS"
  h2: "Manufacturer-Certified. Not Just Brand-Affiliated."
  body: |
    There is a meaningful difference between a contractor who buys GAF or
    Owens Corning products and one who has been vetted and certified by those
    manufacturers. At Pro Exteriors, we hold both.
  manufacturers:
    - name: "GAF Master Elite"
      logo_slot: "[REPRESENTATIVE — GAF Master Elite logo]"
      body: |
        GAF grants Master Elite status to fewer than 2% of roofing contractors
        in the United States. The requirements include demonstrated financial
        stability, proper licensing in every state we operate, and a documented
        commitment to ongoing training. The practical benefit for our customers:
        we are authorized to issue the Golden Pledge Limited Warranty — GAF's
        most comprehensive coverage, which includes a 25-year, non-prorated
        workmanship warranty backed by GAF itself.
    - name: "Owens Corning Preferred Contractor"
      logo_slot: "[REPRESENTATIVE — Owens Corning Preferred logo]"
      body: |
        Owens Corning's Preferred Contractor program requires background checks,
        insurance verification, and a record of quality installations. Our
        Preferred status means we can register the Duration Series and
        TruDefinition warranty for our customers at the time of installation
        and facilitate warranty transfers when a home is sold.

