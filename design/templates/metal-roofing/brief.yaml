flags:
  - id: high-volume-high-competition-head-term
    severity: warning
    message: |
      "Metal roofing" at 110K vol is HIGH competition — dominated by manufacturers
      and directories. Do not target the head term for H1 or title. "Metal roof
      installation" (27,100 vol, LOW comp) is the correct primary. Use "metal
      roofing" as a high-frequency body term only.
  - id: noise-perception-faq
    severity: info
    message: |
      "Is metal roofing loud?" is a real objection. FAQ must address this factually
      (with proper insulation, metal is comparable to asphalt in indoor noise).
      Do not claim it's "quieter" without a sourced reference.

