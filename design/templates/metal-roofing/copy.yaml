service_overview:
  eyebrow: "WHY METAL ROOFING"
  h2: "A 50-Year Roof. Not a 25-Year Replacement Cycle."
  body: |
    The math on metal roofing is simple and most contractors would rather you
    not run it. A standing seam metal roof installed today at [REPRESENTATIVE —
    insert Pro Exteriors range] per square foot costs more upfront than
    architectural shingles. Stretched over 50 years of service life versus
    two or three asphalt replacement cycles, the per-year cost often lands
    lower — and that figure does not account for energy savings from metal's
    reflective surface or the insurance premium reductions available to
    homeowners in hail-belt markets who upgrade to a Class 4 system.

    Pro Exteriors installs metal roofing for homes across Texas, Colorado,
    Kansas, Missouri, and Georgia as an experienced residential roofing
    contractor serving the region for more than 15 years. Our crews work
    with Galvalume standing seam, stone-coated steel systems, and corrugated
    profiles — the right system depends on the home's architecture, the local
    weather profile, and the budget. That recommendation starts with a free
    assessment, not a sales pitch.
  image_slot:
    alt: "Close-up of standing seam metal roof panels with raised seams catching afternoon light"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"
  credential_badges:
    - "GAF Certified Residential Metal Installer"
    - "50-Year Panel Warranty Available"
    - "Class 4 Impact Resistant Systems"

systems_grid:
  id: "systems"
  eyebrow: "METAL ROOFING SYSTEMS"
  h2: "Three Systems. One Certified Installer."
  subhead: "Metal roofing is not a single product. Here are the three systems we install and when each makes the most sense."
  cards:
    - id: "standing-seam"
      eyebrow: "MOST DURABLE"
      h3: "Standing Seam Metal Roofing"
      body: |
        The premium metal roofing system for residential applications. Concealed
        fasteners eliminate the moisture intrusion risk that exposed-fastener
        panels carry over time. Standing seam panels interlock at raised seams
        running vertically from ridge to eave — the result is a clean,
        architectural surface with no exposed hardware. Typical service life
        is 50+ years with minimal maintenance. GAF-certified standing seam
        installation is available for qualifying projects.
      specs:
        - "Lifespan: 50+ years"
        - "Fasteners: Concealed (no penetrations)"
        - "Wind rating: Up to 140 mph"
        - "Best for: Long-tenure homes, premium builds, mountain climates"
      image_slot:
        alt: "Standing seam metal roof with raised vertical seams on a residential home"
        src: "[REPRESENTATIVE — NOT YET SOURCED]"
    - id: "stone-coated"
      eyebrow: "POPULAR IN HAIL BELT"
      h3: "Stone-Coated Steel Roofing"
      body: |
        Stone-coated steel panels give homeowners the look of traditional tile,
        shake, or shingles with the impact resistance of a steel substrate. The
        acrylic stone coating gives the product its aesthetic range and the steel
        core provides Class 4 hail resistance — making this system particularly
        well-suited to Texas, Colorado, and Kansas markets where large hail is a
        recurring threat. Lighter than clay tile, longer-lived than asphalt.
        DECRA and Boral are two established brands our crews install.
      specs:
        - "Lifespan: 40–50 years"
        - "Hail rating: Class 4 (UL 2218)"
        - "Weight: ~1.4 lbs/sq ft (lighter than tile)"
        - "Best for: Hail-belt markets, tile aesthetics without tile weight"
      image_slot:
        alt: "Stone-coated steel residential roofing panels in a shake profile"
        src: "[REPRESENTATIVE — NOT YET SOURCED]"
    - id: "corrugated"
      h3: "Corrugated Metal Roofing"
      body: |
        Corrugated metal panels — the exposed-fastener workhorse of agricultural
        and light-commercial construction — have found a place in residential
        architecture, particularly on modern farmhouse, industrial, and rural
        builds. Lower upfront cost than standing seam. Proper installation
        requires attention to fastener placement and sealing; condensation
        management is important in humid climates like Georgia. Galvanized
        and Galvalume substrates available.
      specs:
        - "Lifespan: 30–45 years (properly maintained)"
        - "Fasteners: Exposed (require periodic inspection)"
        - "Cost: Lower than standing seam"
        - "Best for: Farmhouse, rural, modern industrial aesthetics"
      image_slot:
        alt: "Corrugated metal roofing on a modern farmhouse residential build"
        src: "[REPRESENTATIVE — NOT YET SOURCED]"

