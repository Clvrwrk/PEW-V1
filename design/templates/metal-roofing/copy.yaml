faq:
  eyebrow: "FREQUENTLY ASKED"
  h2: "Your Metal Roof Questions, Answered."
  items:
    - q: "How long does a metal roof last?"
      a: |
        Standing seam metal roofing has a documented service life of 50+ years.
        Stone-coated steel systems run 40–50 years. Corrugated metal, properly
        maintained, runs 30–45 years. All three significantly outlast the 25–30 year
        practical lifespan of architectural asphalt shingles. The transferable
        warranty documentation Pro Exteriors provides at job completion gives you
        evidence of that lifespan when you sell the house. See <a href="/blog/5-signs-replacement">five signs your roof needs replacing</a>
        if you are trying to decide whether to repair or replace your current roof.

    - q: "Can metal roofing withstand hail?"
      a: |
        Standing seam and stone-coated steel panels are rated Class 4 under UL 2218
        — the highest hail-impact classification for roofing materials. A Class 4
        rating means the panel withstood two direct strikes from a 2-inch steel ball
        dropped from 20 feet without fracturing. For homeowners in Texas, Colorado,
        and Kansas where hail events exceeding 1 inch in diameter are common, metal
        roofing is the most durable residential option available. It also typically
        qualifies for <a href="/residential/hail-damage-repair">hail damage repair insurance</a>
        documentation and may qualify for premium reductions in hail-belt states
        [REPRESENTATIVE — verify with Chris before this sentence ships].

    - q: "Is metal roofing louder than asphalt shingles when it rains?"
      a: |
        With solid sheathing under the panels — which is standard in residential
        metal roofing installation — the indoor noise level during a rainstorm is
        comparable to what you would hear with asphalt shingles over the same
        substrate. The "loud tin roof" perception comes from agricultural metal
        roofing installed over open framing with no solid deck — a different
        product on a different structure. Proper residential metal roofing
        installation includes solid OSB or plywood sheathing and underlayment
        that absorbs sound. If noise is a specific concern, we can walk you
        through insulation and underlayment options during the free assessment.

    - q: "What does metal roof installation cost?"
      a: |
        Cost varies significantly by system type, roof complexity, and square footage.
        Standing seam is the most expensive; stone-coated steel is mid-range;
        corrugated is the entry point for metal. [REPRESENTATIVE — NOT YET SOURCED:
        Insert Pro Exteriors confirmed price ranges per system before this ships, or
        cite a sourced industry reference such as RS Means or HomeAdvisor data.]
        The more useful number is cost per year of service life — a standing seam
        roof at twice the upfront cost of asphalt, lasting twice as long, often
        has comparable or lower annualized cost. See our guide on <a href="/blog/how-much-does-a-roof-replacement-cost">how much a roof replacement actually costs</a>
        for a framework to evaluate any estimate you receive. Every Pro Exteriors
        project starts with a free assessment and a line-item estimate.

