    placement: "Title (1), H1 (1), meta (1), first 100 words (1), ≥1 in process section"
  "metal roofing":
    target_range: "20–35"
    read: "Volume driver — highest-frequency body term throughout."
  "metal roof":
    target_range: "15–25"
    read: "Noun form alongside 'metal roofing'."
  "standing seam":
    target_range: "8–12"
    read: "Primary system type — systems grid + service overview + FAQ."
  "stone-coated":
    target_range: "5–8"
    read: "Second system type."
  corrugated:
    target_range: "3–5"
    read: "Third system type."
  hail:
    target_range: "5–8"
    read: "Hail-belt positioning — key differentiator vs. asphalt."
  energy:
    target_range: "4–6"
    read: "Energy efficiency is metal's secondary value prop."
  warranty:
    target_range: "6–10"
    read: "50-year warranty + transferability."
  installation:
    target_range: "10–15"
    read: "Core service term."
  contractor:
    target_range: "4–6"
    read: "Positions page as a contractor vs. manufacturer page."
  geographic_state_moats:
    target_range: "Each state 2–4×"

schema_types_required:
  - type: RoofingContractor
    required: true
  - type: Service
    required: true
    notes: "serviceType: Metal Roofing Installation"
  - type: BreadcrumbList
    required: true
    placement: "Home > Residential Roofing > Metal Roof Installation"
  - type: FAQPage
    required: true

flags:
  - id: avoid-head-term-h1
    severity: warning
    message: |
      Do not use "metal roofing" (HIGH comp) in H1 or title tag.
      Use "Metal Roof Installation" as the conversion anchor instead.
  - id: noise-objection
    severity: info
    message: |
      FAQ must address "Is metal roofing loud?" factually — with proper
      solid sheathing and insulation, indoor noise is comparable to asphalt.
      Do not overclaim "quieter" without a sourced reference.

