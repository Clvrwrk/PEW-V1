# ─── Always required ───
slug: commercial-roofing
template: pillar                      # Top-of-vertical landing, not a single-service page
location: null                        # National pillar, not city-specific
target_keyword: "commercial roofing contractor"
secondary_keywords:
  - "commercial roofing"
  - "commercial roofing company"
  - "commercial roofing systems"
  - "commercial roofing services"
  - "commercial roofing solutions"
audience: commercial-procurement
intent: solution-evaluation           # Procurement officers research before they call
hypothesis: |
  Replacing the current thin commercial-roofing landing (single hero + 4 service
  tiles + map + 2 FAQs) with the full Figma pillar (industrial hero + 4 stats +
  7-system grid + manufacturer cert band + 3 reliability proof points + Gold
  Standard testimonial + 3-real-case bento + nationwide reach map + 3-FAQ
  accordion + inline executive assessment form) will lift assisted conversion
  (form fill OR phone CTA OR /contact CTA) by ≥30% within 90 days vs. the
  current pre-rebuild baseline.

  Instrumentation: GA4 events on every CTA (data-cta-name attribute), inline
  form posts to /api/lead with vertical=commercial, baseline read from the
  pre-rebuild 30-day window, A/B-equivalent comparison on raw rate. Single-
  metric hypothesis — assisted conversion is the gate.

# ─── SEO copy bundle ───
seo_copy:
  metadata:
    title: "Commercial Roofing Contractor — 16 States | Pro Exteriors"
    meta_description: |
      Commercial roofing contractor licensed across 16 states. TPO, EPDM, metal,
      modified bitumen, coatings, and 24/7 emergency response for facility
      portfolios. Get an executive roof assessment.
    canonical: "https://pc-demo.cleverwork.io/commercial-roofing/"
  body_path: "uploads/Commercial Roofing Contractor.docx"
  html_path: "uploads/Commercial Roofing Contractor.html"

# ─── Figma reference (no existing pillar template covers this layout yet) ───
