# ─── Build flags raised at intake ───
flags:
  - id: stats-override
    severity: warning
    message: |
      Per /decisions/2026-05-03-commercial-roofing-stats-override.md, four stats
      ship without sources by stakeholder override (42 states / 30+ years /
      15M+ sq ft / 98% retention). Three contradict the home page. Page-qc gate
      is set to 'override' status, NOT 'pass', for this hard-gate dimension.
  - id: hero-binary-resolved
    severity: resolved
    message: |
      RESOLVED 2026-05-03 round-2: Chris confirmed the Texas Motor Speedway
      image IS the existing /public/images/commercial-hero.webp. Page uses
      <picture> with .webp + .jpg fallback. No launch blocker for hero.
  - id: case-study-reuse
    severity: info
    message: |
      Per Chris's intake decision, the four fictional case studies in the Figma
      design (Regional Medical Center / State University / Logistics Hub /
      National Retail Chain + Gold Standard testimonial) are replaced by the
      three real Pro Exteriors TPO case studies (techpark-logistics-tpo /
      dallas-north-mall-tpo / fort-worth-tpo) plus a "Your Project Next?" CTA
      card. Two of the three real cases also carry [REPRESENTATIVE] markers
      internally — they remain real-named projects with assets, but full project
      data is still pending client confirmation.
  - id: figma-form-vs-existing-form
    severity: info
    message: |
      Figma includes an inline 4-field "Executive Roof Assessment" form (Company
      Name, Facility Type, Approx. Sq. Ft., Timeline). Build wires it to the
      existing /api/lead.ts endpoint with vertical=commercial; phone and email
      promoted from the contact page so the inline form is conversion-complete
      without a /contact redirect. Hidden honeypot field on the form per existing
      LeadForm pattern.

