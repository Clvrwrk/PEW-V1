# ─── SECTION 8: Commercial FAQ ───
faq:
  h2: "Commercial FAQ"
  questions:
    - q: "How long does a commercial roof replacement typically take?"
      a: |
        Timelines vary by facility size and system type. A typical 50,000 sq.
        ft. warehouse re-roof runs two to three weeks once tear-off and weather
        windows are factored in. We commit to a guaranteed phased schedule
        during the assessment so building operations can continue during work.
        For the trade-offs between repair, overlay, and full replacement see
        our breakdown of <a href="/blog/commercial-roof-repair-vs-replacement/">commercial roof repair vs replacement</a>.
      links_woven:
        - { anchor: "commercial roof repair vs replacement", target: "/blog/commercial-roof-repair-vs-replacement/" }
    - q: "What is an NDL warranty and why do I need it?"
      a: |
        An NDL (No Dollar Limit) warranty is the manufacturer's commitment to
        repair or replace your roofing system without a financial cap on labor
        or material costs through the warranty term — typically 20 to 30 years
        on commercial single-ply systems. Standard warranties cap exposure;
        NDL warranties don't. For a multi-million-dollar roof on a Class A
        property, that uncapped exposure is the single most important paragraph
        in the warranty packet. NDL coverage is only available through
        manufacturer-certified installers — including GAF Master Elite,
        Firestone Licensed, and Owens Corning Platinum contractors.
    - q: "Can you perform work without interrupting our business operations?"
      a: |
        Yes — phased off-hours installation is standard practice on our
        commercial portfolio. Our hot-air welded TPO seams produce no fumes,
        which makes daytime adjacent work feasible on retail and multi-tenant
        properties. For 24/7 operations like distribution centers, we sequence
        tear-off and install in zones that follow the building's operational
        rhythm — overnight crews on the dock-side, daytime crews on inactive
        areas. Documentation of the phasing plan is part of the executive
        assessment deliverable.

# ─── SECTION 9: Executive Roof Assessment form ───
assessment_form:
  id: assessment-form                        # Hero CTA anchors here
  h2: "Get Your Executive Roof Assessment"
  body: |
    Schedule a comprehensive analysis of your facility's current roof
    condition. Our reports include thermal imaging, core samples, and a
    multi-year maintenance roadmap. No commitment. Real diagnostic.
  trust_strip:
    avatars:                                 # JD / SM / RK initials per Figma
      - { initials: "JD", color: "info-soft" }
      - { initials: "SM", color: "info-soft" }
      - { initials: "RK", color: "info-soft" }
    accent_text: "Expert consultation"
    body_text: "ready for your call."
  fields:
    - id: company_name
      label: "Company Name"
      type: "text"
      placeholder: "e.g. Global Logistics Inc."
      required: true
    - id: facility_type
      label: "Facility Type"
      type: "select"
      options:
        - "Warehouse / Industrial"
        - "Retail / Big Box"
        - "Multi-Tenant Office"
        - "Education / Institutional"
        - "Healthcare"
        - "Manufacturing"
        - "Other"
      required: true
    - id: square_footage
      label: "Approx. Sq. Ft."
      type: "number"
      placeholder: "e.g. 100,000"
      required: true
    - id: timeline
      label: "Timeline"
      type: "select"
      options:
        - "Immediate / Emergency"
        - "Within 30 days"
        - "Within 90 days"
        - "Planning for next budget cycle"
      required: true
    - id: vertical
      type: "hidden"
      value: "commercial"
    - id: intent
      type: "hidden"
      value: "executive-assessment"
    - id: company_website                    # Honeypot per existing LeadForm pattern
      type: "honeypot"
  submit:
    label: "SEND ASSESSMENT REQUEST"
    data_cta_name: "form_assessment_submit"
    post_endpoint: "/api/lead"
  trust_text: "Confidentiality assured · 24-hour response"

