cost_value:
  eyebrow: "THE COST QUESTION"
  h2: "Higher Upfront. Lower Per-Year. The Math Is Different for Tile."
  body: |
    Clay and concrete tile installation costs more upfront than asphalt shingles —
    a meaningful premium on materials, and an installation that takes longer because
    of structural verification, heavier materials, and the detail work that tile
    profiles require. That is not in dispute.

    The per-year cost comparison is different. A high-quality asphalt shingle roof
    lasts 25–30 years in moderate climates and needs replacement at the end of that
    cycle. A clay tile installation in the same climate runs 75–100+ years. If you
    divide the installed cost by the lifespan, tile's per-year ownership cost is
    often lower than multiple asphalt shingle replacements over the same timeframe —
    and that's before accounting for the disposal and reinstallation cycles that
    asphalt requires.

    For homeowners who plan to stay in their home for 20+ years, the economics of
    tile deserve a look. For homeowners planning to sell in the near term, asphalt
    shingles remain the right answer. We'll give you the numbers for your specific
    project at the assessment. Financing is available for qualified projects.

    For a full comparison of residential roofing material options, see the
    <a href="/residential/roof-replacement">roof replacement</a> page. If natural
    permanence is the priority and budget is not the constraint, see
    <a href="/residential/natural-slate">natural slate roofing</a>.
  image_slot:
    alt: "Pro Exteriors tile roof installation — structural assessment and tile work in progress"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

faq:
  eyebrow: "FREQUENTLY ASKED"
  h2: "Clay and Tile Roofing Questions, Answered."
  items:
    - q: "Is my roof structure strong enough for tile?"
      a: |
        It depends — which is why the structural assessment is step one of every
        tile installation Pro Exteriors undertakes. Clay and concrete tile run
        9–12 lbs per square foot. Most homes originally built with asphalt shingles
        were framed for 2–4 lbs per square foot. The additional dead load needs to
        be evaluated by a Pro Exteriors installer who can look at your specific
        framing, rafter span, and decking condition.

        In many cases, the existing structure is adequate or requires modest
        reinforcement. In some cases — particularly on older homes with undersized
        rafters or long rafter spans — the structural work required makes tile
        impractical. We tell you that at the assessment, not after material is
        ordered. If tile is ruled out, the assessment report tells you exactly why.

    - q: "How long does clay tile roofing last?"
      a: |
        Clay tile is one of the longest-lived roofing materials available. In
        favorable climates (dry, moderate thermal cycling, low freeze-thaw
        frequency), 75–100 year lifespans are documented — and historic buildings
        with original clay tile installations do exist. In the climates we serve
        (Texas, Colorado, Kansas, Missouri, Georgia), 60–80 years is a realistic
        expectation for properly installed clay tile.

        Concrete tile has a shorter lifespan than clay — typically 50–80 years
        under similar conditions. Both significantly outlast asphalt shingles
        (25–30 years) and most other residential roofing materials.

    - q: "Can tile roofing withstand hail?"
      a: |
        Clay tile is hard and fire-resistant, but it is brittle — and large hailstones
        can crack individual tiles on impact. This is a real consideration for homes
        in the Texas and Colorado hail belt, where 2-inch-plus hail events occur
        with meaningful frequency.

        Cracked tiles can be replaced individually without replacing the full roof —
        one practical advantage of tile is that repair-in-place is feasible in a
        way that asphalt replacement is not. But if you're in a high-frequency large-hail
        zone and longevity without maintenance interruption is the priority, concrete
        tile (harder than clay) or impact-resistant asphalt shingles may be a
        more suitable choice for your geography. We'll give you a direct assessment
        based on your property's location.

    - q: "What does tile roof installation cost compared to asphalt?"
      a: |
        Tile costs more to install than asphalt — the materials are more expensive,
        the installation is more labor-intensive, and the project takes longer.
        A direct comparison on per-square-foot installed cost will show tile at
        a meaningful premium to asphalt.

        The per-year cost comparison is different. Divide the installed cost of
        clay tile by an 80-year lifespan and compare it to multiple asphalt
        shingle replacements (and associated tear-off costs) over the same period,
        and tile's economic case becomes clearer for homeowners who plan to hold
        the property long-term. For the material comparison breakdown, see the
        <a href="/residential/roof-replacement" class="underline hover:no-underline">roof replacement</a>
        page. For a specific estimate on your home, the assessment is free.

