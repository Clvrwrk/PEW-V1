service_overview:
  eyebrow: "WHY TILE ENDURES"
  h2: "Clay and Tile Roofing Lasts 50–100 Years. The Upfront Cost Looks Different When You Run the Per-Year Math."
  body: |
    Clay tile roofing has been the premium residential roofing material in hot,
    dry climates for centuries — and for reasons that still hold. Clay tile is
    naturally fire-resistant (Class A fire rating without chemical treatment),
    thermally dense (the air gap between tiles provides natural insulation that
    reduces attic heat load), and mechanically durable in the ways that matter for
    the Southwest and the southern Great Plains.

    The profiles run from the familiar Spanish S-tile (the curved barrel profile
    associated with Mediterranean and mission architecture) to flat tile (a sleeker
    profile that reads as contemporary on modern Southwestern homes) to concrete
    tile (the more affordable sibling that delivers similar durability and profile
    options at a lower cost per square foot).

    The trade-off is weight and installation complexity. Clay and concrete tile
    run 9–12 lbs per square foot versus 2–4 lbs for asphalt shingles. Before
    any tile installation, Pro Exteriors conducts a structural assessment of the
    roof framing and decking to determine whether the existing structure can
    support the load — or what reinforcement is required. This step is not optional,
    and any tile contractor who skips it is taking a risk with your structure.
  cta:
    label: "Schedule Your Free Tile Roof Assessment"
    href: "/contact?intent=tile-assessment&source=tile-clay-roofing-overview"
    data_event_action: "cta-click"
    data_event_label: "overview-cta"
    data_event_category: "tile-clay-roofing"
  image_slot:
    alt: "Spanish S-tile roofing installation on a Pro Exteriors residential project in Texas"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

tile_types_grid:
  id: "tile-types"
  eyebrow: "TILE OPTIONS"
  h2: "Three Tile Profiles. Different Aesthetics, Different Price Points."
  cards:
    - id: "clay"
      icon: "sun"
      h3: "Clay Tile"
      body: "The traditional premium option. Natural clay fired at high temperature — the process that gives clay tile its signature color permanence (clay doesn't fade), its Class A fire rating, and its 75–100+ year lifespan. Available in Spanish S-tile, flat tile, and barrel profiles. Heavier than concrete tile (typically 10–12 lbs/sq ft) and requires structural verification before installation."
      badge: "Premium · 75–100+ yr"
    - id: "concrete"
      icon: "layers"
      h3: "Concrete Tile"
      body: "The more accessible entry point to the tile category — comparable profile options and similar durability to clay at a meaningfully lower cost per square foot. Concrete tile runs 9–11 lbs/sq ft, provides a Class A fire rating, and is available in a wide range of color options that are factory-applied rather than natural (meaning color can fade more than clay over decades, though modern pigments have improved significantly)."
      badge: "Mid-Range · 50–80 yr"
    - id: "spanish"
      icon: "home"
      h3: "Spanish (S-Tile)"
      body: "A profile designation, not a material — Spanish tile refers to the curved S-shaped interlocking profile available in both clay and concrete. It's the most recognizable tile profile on Southwestern and Mediterranean-style homes. The curved profile creates the natural air gap that gives tile roofs their thermal performance advantage. Specify clay or concrete depending on your budget and aesthetic priorities."
      badge: "Most Common Profile"

