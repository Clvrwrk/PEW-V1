process:
  id: "process"
  eyebrow: "THE INSTALLATION PROCESS"
  h2: "Four Steps. The First One Determines Everything Else."
  steps:
    - number: 1
      title: "Structural Assessment"
      body: "Before tile is selected or ordered, a Pro Exteriors inspector evaluates the roof framing, decking condition, and any structural reinforcement required to support the tile load. Clay and concrete tile run 9–12 lbs per square foot — 3–5× the weight of asphalt shingles. The structural assessment is the step that determines whether your home is a straightforward tile candidate, needs reinforcement, or has a geometry that makes tile impractical. We tell you the truth at this step."
      icon: "search"
    - number: 2
      title: "Tile Selection"
      body: "Once the structure is confirmed to support tile, we work through the profile (Spanish S-tile, flat, barrel), material (clay vs. concrete), and color options. If you're in a neighborhood with HOA guidelines or a historic district with material requirements, we review those before selection, not after. Lead times for specialty clay tile can run 4–8 weeks — order early in the project sequence."
      icon: "layers"
    - number: 3
      title: "Staged Installation"
      body: "The underlayment system for tile is more intensive than asphalt — proper installation includes a high-temperature underlayment rated for the thermal cycling that tile roofs experience. Tiles are fastened individually per the manufacturer's requirements for your wind zone. Hip caps, ridge tiles, and flashing details at penetrations are set by hand. Installation is methodical; the timeline for a full tile replacement is typically 5–10 days depending on roof complexity."
      icon: "hard-hat"
    - number: 4
      title: "Final Inspection and Warranty"
      body: "Full walk of every run, ridge, hip, valley, and flashing point. Pro Exteriors photographs the completed installation for your records. Manufacturer warranty registration is completed by our team. Your documentation package includes the structural assessment, the material specification, and the installation record."
      icon: "check-circle"

