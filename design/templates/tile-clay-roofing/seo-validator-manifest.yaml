structural_weight_gate:
  severity: mandatory
  rule: |
    Clay and concrete tile are significantly heavier than asphalt (9–12 lbs/sq ft
    vs 2–4 lbs/sq ft). The page MUST mention that a structural assessment is required
    before installation to verify the existing decking and roof framing can support
    the additional load. Do NOT imply any home can receive tile without this check.
    This gate is non-negotiable — it protects Pro Exteriors from liability on
    structural failures and pre-qualifies leads.

hail_brittleness_gate:
  severity: info
  rule: |
    Clay tile is brittle and can crack under large hail. This is a real objection
    in the TX/CO/KS hail belt. The FAQ must address this honestly: tile is not
    the ideal choice for the highest-hail-frequency areas. Acknowledge the limitation
    without making it the headline. Honest disclosure builds more trust than evasion,
    and it pre-qualifies leads who are in unsuitable locations.

