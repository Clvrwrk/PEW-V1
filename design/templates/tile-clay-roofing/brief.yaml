hypothesis: |
  "Clay tile roofing" earns 12,100 monthly searches at LOW competition and
  $5.98 CPC — informational intent means searchers are researching before
  buying. Pairing the volume-driver keyword (clay tile roofing, 12,100) with
  the transactional anchor (tile roof installation, 1,300 vol, $17.52 CPC)
  captures both phases of the buyer journey. Tile and clay projects have
  higher average job values and attract a different homeowner profile (custom
  homes, historic renovations, Southwestern aesthetics) — positioning Pro
  Exteriors in this premium segment expands the customer mix.
    (a) Rank in the top 5 for "clay tile roofing" in served states within
        6 months; AND
    (b) generate ≥15 qualified tile/clay inquiries per month within 90 days
        as a soft metric (tile is a low-volume specialty — absolute numbers
        are small but job values are high).

