flags:
  - id: structural-weight-disclaimer
    severity: warning
    message: |
      Clay and concrete tile are significantly heavier than asphalt (9–12 lbs/sq ft
      vs 2–4 lbs/sq ft). Page MUST mention that a structural assessment is required
      before installation to determine if the existing decking can support the load.
      Do NOT imply any home can get tile without this check.
  - id: hail-resistance-nuance
    severity: info
    message: |
      Clay tile is brittle and can crack under large hail. This is a real
      objection in the hail belt. FAQ should address this honestly: tile is
      not ideal for the highest-hail-frequency areas; the structural
      assessment and geographic context matter. Don't obscure a legitimate
      product limitation.

