# ─── Humanizer pass (Hue Write) — DECISION: REJECTED ───
humanizer_pass:
  ran: true
  tool: /tech/scripts/huewrite.py
  tone: professional
  model: v3.5
  input_words: 1080
  output_words: 1605
  output_path: design/templates/tpo-roofing-systems/draft-prose.humanized.professional.txt
  decision: rejected
  rationale: |
    Humanizer output failed every voice-gate check:
      1. Lengthened the draft by 49% with marketing fluff ("unparalleled
         performance and value for any business anywhere in the world").
      2. Renamed all section headings I drafted in Maren voice ("Our Approach,"
         "The Pro Exteriors Advantage," "You Might Also Like" — generic SEO
         template language, not Maren).
      3. Fabricated a sourceable claim with no basis: "we've been installing
         quality TPO systems in DFW businesses since 2004." Pro Exteriors'
         founding year was never provided to the humanizer; this is a
         hallucination and would violate CLAUDE.md §4 hard gate
         (every claim has a source).
      4. Inserted a factually wrong technical spec: "4,000 PSI strength" for
         TPO. That's not a TPO membrane spec at all — it's compressive strength
         of concrete or yield strength of mild steel. The actual TPO membrane
         spec is tensile/break strength in psi units (~225–300 psi). A reader
         with technical knowledge would catch this immediately.
      5. Broke every internal link anchor by adding whitespace around hyphens
         in URLs (/blog/tpo - vs - epdm - vs - pvc) — link integrity is
         non-negotiable for the reverse-silo system.
      6. Replaced Maren voice with generic contractor marketing-speak
         throughout.
    Net: the humanizer is the wrong tool when the input is already
    voice-authored. It works as a "smooth out generic AI spin" step; it does
    not work as a "preserve a deliberate authorial voice" step. Decision logged
    so future builds can sequence accordingly.
  recommended_future_use: |
    Hue Write should run BEFORE the Maren editorial pass, not after. Pipeline:
    (1) SEO writer's raw draft → (2) Hue Write humanize (smooths the AI-spin)
    → (3) Maren rewrite for voice + sourcing + link weaving. This build did
    (1) → (3) → (2), which is wrong order. Update aia4-copywriter SKILL.md
    workflow to reflect the corrected sequence.

