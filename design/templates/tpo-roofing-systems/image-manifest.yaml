# ─── Brand-photography direction adherence ───
brand_direction_check:
  real_feel: pass
  no_stock_aesthetic: pass
  environmental_color_palette: pass  # Texas mid-day light, deep shadows, natural ground tones
  brand_colors_as_accents_only: pass # white membrane is the canvas; flag-red appears nowhere in imagery (correct — interaction color only)
  commercial_vertical_bias: pass     # 6 of 8 images are commercial; 1 residential complex; 1 detail
  forbidden_pattern_scan: |
    No "diverse smiling team in hard hats" stock-photo aesthetic detected.
    All people-images show working crews in real install context, not posed
    portraits.

# ─── Notes ───
notes:
  - "Hero requested 21:9 but Higgsfield auto-adjusted to 16:9 (closest supported aspect for cinematic_studio_2_5). Acceptable — the dynamic template's ServiceHero component crops to its container."
  - "All images are PNG at 2K resolution. Production build should generate WebP variants via Astro image optimization for Lighthouse Performance compliance."
  - "GPT Image 2 default quality is 'low' (model server default). Re-running at 'high' would burn ~3x credits per image; current quality is sufficient for the layout test."
  - "Case-study images are paired with [REPRESENTATIVE — NOT YET SOURCED] copy in the case-study mdx files. When real Pro Exteriors job photos arrive, swap the file at the public path; no template change needed."

