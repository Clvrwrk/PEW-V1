bundle_band:
  id: "bundle"
  eyebrow: "ROOF + GUTTER BUNDLE"
  h2: "One Storm. One Crew. One Insurance Claim."
  body: |
    When a hail storm or high-wind event damages a roof, it almost always damages
    the gutters at the same time. Most homeowners handle these as separate projects —
    a roofing contractor first, a gutter contractor later. That means two mobilization
    fees, two inspection visits, two insurance line items, and two scheduling windows.

    Pro Exteriors handles both on the same job. Our crews install seamless gutters as
    part of the same project scope as the <a href="/residential/roof-replacement">roof
    replacement</a>, billed on the same contract and documented in the same insurance
    claim. The savings in logistics alone are measurable, and the roof-to-gutter
    integration is cleaner when both systems are installed by the same crew in sequence.

    If you're working through a <a href="/residential/storm-damage-repair">storm damage
    repair</a> or full replacement, ask about adding gutter replacement to the scope
    when you book your assessment. The marginal cost to add gutters to an active roof
    job is significantly less than scheduling it as a separate project.
  image_slot:
    alt: "Pro Exteriors crew completing a combined roof replacement and gutter installation project"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

faq:
  eyebrow: "FREQUENTLY ASKED"
  h2: "Seamless Gutter Questions, Answered."
  items:
    - q: "What is the difference between seamless and sectional gutters?"
      a: |
        Sectional gutters come in pre-cut lengths — typically 10 or 20 feet —
        that are joined together during installation. Each joint is sealed with
        caulk or a gasket, and every joint is a potential failure point as the
        caulk ages and the sections expand and contract seasonally.

        Seamless gutters are fabricated in a continuous run from a coil of metal
        using a roll-forming machine that comes to your property. There are no
        mid-run joints — the only connections are at corners and at the downspout.
        This eliminates the most common source of residential gutter leaks.

    - q: "How long do seamless gutters last?"
      a: |
        Aluminum seamless gutters typically last 20–30 years under normal
        residential conditions. Copper can last 50 years or more and is frequently
        specified on historic renovation projects where permanence matters.
        Steel occupies the middle ground — more durable than aluminum in high-debris
        or heavy-snow environments, with a comparable lifespan when properly maintained.

        Lifespan depends on maintenance (gutters should be cleaned at least twice
        a year in storm-prone areas), the severity of local weather events, and
        whether the fascia board underneath the gutter is kept in good condition.

    - q: "Can I get gutters and roofing done at the same time?"
      a: |
        Yes, and we recommend it. When a storm event damages both the roof and
        the gutters — which is the typical pattern in hail belt events — handling
        both on the same job scope eliminates duplicate mobilization costs, simplifies
        the insurance claim, and ensures the gutter system integrates properly with
        the new roofline.

        The sequencing is roof first, gutters second on the same project — so the
        gutter fascia attachment goes on the finished soffit, not on a temporary
        surface. Ask about the combined scope when you book your assessment.

    - q: "Does insurance cover gutter damage from storms?"
      a: |
        In most standard homeowner policies, yes — gutter damage caused by a covered
        storm event (hail, wind, falling debris) is included in the claim settlement.
        The key is documentation: gutter damage needs to be documented at the same
        time as the roof damage and included in the same adjuster inspection.

        If you've already filed a roof claim and didn't include the gutters, a
        supplement can often be added before the claim closes. See our
        <a href="/residential/insurance-claim-assistance" class="underline hover:no-underline">insurance claim assistance</a>
        page for how that process works. If you're dealing with active
        <a href="/residential/storm-damage-repair" class="underline hover:no-underline">storm damage</a>,
        we document both systems on the initial inspection.

