cost_financing:
  image_slot:
    alt: "Pro Exteriors project manager reviewing line-item estimate with a homeowner at a kitchen table"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"
  right_column:
    eyebrow: "COST & FINANCING"
    h2: "What Drives the Price of a Roof Replacement"
    body: |
      Five variables determine what your roof replacement actually costs: square
      footage, material selection, number of tearoff layers, decking condition,
      and roof complexity (pitch, valleys, penetrations). A simple 1,500 sq ft
      gable with one layer of shingles and solid decking costs meaningfully less
      than a 3,000 sq ft hip roof with multiple layers and damaged decking.

      Pro Exteriors gives you a line-item estimate — not a handshake number —
      before a single shingle comes off. The estimate details every line: material,
      labor, tearoff, permit fee, decking allowance, and disposal. That document
      is what you take to your insurance carrier if the replacement is storm-driven.
