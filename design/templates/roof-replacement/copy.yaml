seamless_process:
  id: "process"
  eyebrow: "OUR PROCESS"
  h2: "Free Inspection to Registered Warranty — Four Steps."
  subhead: "No ambush pricing. No subcontracted crews. This is how every roof replacement runs at Pro Exteriors."
  steps:
    - number: 1
      title: "Free Inspection & Assessment"
      body: "A Pro Exteriors crew member inspects every element of your current roof — age, granule condition, decking integrity, flashing, ventilation, and drainage — and gives you a written summary with photos before we discuss pricing."
