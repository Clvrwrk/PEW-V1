service_overview:
  eyebrow: "REPAIR OR REPLACE?"
  h2: "Five Signals That a Repair Won't Cut It"
  body: |
    Most contractors will tell you a roof needs replacing the moment they're
    asked to look at it. That is not the business model at Pro Exteriors. Our
    free inspection starts with an honest assessment of whether replacement is
    actually the right answer, and we put the reasoning in writing.

    That said, there are five signals that consistently indicate a roof
    replacement is the better economic decision over continued repair:
    (1) The roof is more than 20–25 years old and showing widespread granule
    loss from the shingles. (2) You have had three or more leaks in the past
    five years that didn't trace to isolated flashing failures. (3) The decking
    shows soft spots or sag lines visible from ground level — structural
    compromise that individual repairs can't address. (4) Hail or wind has
    damaged more than 30–40% of the shingle field — at that point, a repair
    is cosmetically incomplete and won't satisfy most insurance carriers
    anyway. (5) Your energy bills are rising in ways consistent with a failing
    insulation layer in the roofing assembly.

    If one or more of these apply to your home, see our breakdown of the
    <a href="/blog/5-signs-replacement">five signs your roof needs replacing</a>
    and then call or request a free inspection from a Pro Exteriors
    <a href="/residential">residential roofing contractor</a> in your state.
  image_slot:
    alt: "Pro Exteriors inspector reviewing a residential roof condition, tablet in hand"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

materials_grid:
  id: "materials"
  eyebrow: "CHOOSE YOUR ROOFING MATERIAL"
  h2: "One Replacement. Four Material Options."
  subhead: "Roof replacement is an opportunity to choose the material that fits your home, your climate, and your time horizon. Here are the four systems we install."
  cards:
    - id: "asphalt"
      eyebrow: "MOST POPULAR"
      h3: "Asphalt Shingles"
      body: |
        The right answer for the majority of residential replacements. GAF and
        Owens Corning architectural shingles — 25–50 year lifespan, competitive
        cost, Class 4 impact-resistant options available for hail-belt homes.
        GAF Master Elite certified installation means we can issue the Golden
        Pledge warranty on qualifying jobs.
      specs:
        - "Lifespan: 25–50 years"
        - "Cost tier: $$"
        - "Best for: Standard replacements, any state"
      link:
        label: "Explore Asphalt Shingle Roofing →"
        href: "/residential/asphalt-shingles"
      image_slot:
        alt: "Architectural asphalt shingles on a residential roof"
        src: "[REPRESENTATIVE — NOT YET SOURCED]"
    - id: "metal"
      h3: "Metal Roofing"
      body: |
        Standing seam, stone-coated steel, and corrugated metal systems.
        50-year service life, Class 4 hail rating, energy-efficient reflective
        surface. Higher upfront cost than asphalt; lower annualized cost over
        the life of the material. Most cost-effective in high-hail markets.
      specs:
        - "Lifespan: 40–50+ years"
        - "Cost tier: $$$"
        - "Best for: Long-tenure homes, hail belt, mountain climates"
      link:
        label: "Explore Metal Roofing →"
        href: "/residential/metal-roofing"
      image_slot:
        alt: "Standing seam metal roof on a residential home"
        src: "[REPRESENTATIVE — NOT YET SOURCED]"
    - id: "tile"
      h3: "Tile & Clay Roofing"
      body: |
        Clay tile, concrete tile, and Spanish S-tile systems. 50–100 year
        lifespan, fire resistant, thermally massive. Heavier than asphalt —
        structural deck verification required before installation. Common on
        custom homes and historic renovations in Texas and Georgia markets.
      specs:
        - "Lifespan: 50–100 years"
        - "Cost tier: $$$"
        - "Best for: Custom homes, Southwestern aesthetics, historic renovations"
      link:
        label: "Explore Tile & Clay Roofing →"
        href: "/residential/tile-clay-roofing"
      image_slot:
        alt: "Clay tile residential roof with flashing detail"
        src: "[REPRESENTATIVE — NOT YET SOURCED]"
    - id: "slate"
      h3: "Natural Slate"
      body: |
        The permanent ceiling of residential roofing. Quarried slate roofs
        routinely outlive the homes around them — 100–150 year service life
        depending on the quarry of origin. Heaviest material we install;
        structural feasibility assessment required. Premium job values;
        specialist crews only.
      specs:
        - "Lifespan: 100–150 years"
        - "Cost tier: $$$$"
        - "Best for: Premium homes, generational investment, historic properties"
      link:
        label: "Explore Natural Slate →"
        href: "/residential/natural-slate"
      image_slot:
        alt: "Natural slate residential roof in late afternoon light"
        src: "[REPRESENTATIVE — NOT YET SOURCED]"

