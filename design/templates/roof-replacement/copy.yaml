faq:
  eyebrow: "FREQUENTLY ASKED"
  h2: "Roof Replacement Questions, Answered."
  items:
    - q: "How long does a roof replacement take?"
      a: |
        A standard residential replacement runs one to two days for installation.
        Permit issuance adds one to five business days depending on the municipality.
        Total project timeline from signed contract to final inspection is typically
        seven to fourteen days, weather permitting. We schedule around forecasted
        rain windows and communicate any delay the same day it surfaces. See our
        guide on the <a href="/blog/best-time-of-year-to-replace-your-roof">best time of year to schedule a roof replacement</a>
        for a deeper look at timing tradeoffs.

    - q: "How do I know if I need a replacement instead of a repair?"
      a: |
        Repairs make sense when damage is isolated — a few missing shingles, a
        failed flashing detail, a single leak point on a relatively young roof.
        Replacement makes sense when the roof is more than 20 years old with
        widespread granule loss, when you have had multiple leaks across the field,
        when hail or wind has damaged more than 30–40% of the surface, or when
        the decking shows structural compromise. Our free inspection gives you a
        written assessment with photos — not a verbal opinion designed to close a
        sale. See the full diagnostic in our <a href="/blog/5-signs-replacement">five signs your roof needs replacing</a>
        breakdown.

    - q: "What does a new roof replacement cost?"
      a: |
        Cost depends on square footage, material choice, tearoff layers, decking
        condition, and roof complexity. [REPRESENTATIVE — NOT YET SOURCED: Insert
        Pro Exteriors' confirmed price ranges per material tier before this ships.]
        The most accurate number comes from a free inspection and a line-item
        estimate — which is how every Pro Exteriors project starts. See our guide
        on <a href="/blog/how-much-does-a-roof-replacement-cost">how much a roof replacement actually costs</a>
        for a framework to interpret any estimate you receive.

    - q: "Does Pro Exteriors handle the insurance claim for storm-related replacements?"
      a: |
        Yes. Storm-driven replacements — hail, wind, water intrusion — are the
        single most common reason homeowners call us. We document damage at the
        free inspection, provide a photo report for your insurance carrier,
        attend the adjuster meeting if requested, and handle supplement filings
        if the initial payout underestimates the scope. We work with your carrier
        directly — you should not have to manage the insurance process and the
        roof project simultaneously. See our <a href="/residential/insurance-claim-assistance">insurance claim assistance</a>
        page for a full breakdown of how we handle storm-damage claims.

