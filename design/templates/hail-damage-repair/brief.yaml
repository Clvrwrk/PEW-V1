flags:
  - id: hail-belt-geographic-moat
    severity: info
    message: |
      TX/CO/KS/MO are disproportionately high hail-frequency states. Page should
      mention each state naturally in the proof block and case studies. This is
      the same geo-moat strategy as the residential pillar — seed each state 2–4×
      in context, not in a list.
  - id: hail-resistant-shingles-upsell
    severity: info
    message: |
      "Hail resistant shingles" (secondary keyword) is a natural upsell for
      homeowners who've already had hail damage and want to upgrade. Copywriter
      should mention Class 4 impact-resistant shingles in the asphalt damage
      section and link to /residential/asphalt-shingles. Do NOT claim Pro
      Exteriors offers insurance discounts for Class 4 shingles unless Chris
      confirms this is factual in their served states.

