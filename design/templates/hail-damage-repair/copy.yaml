  id: "process"
  eyebrow: "OUR PROCESS"
  h2: "Hail Event to Completed Repair — Four Steps."
  subhead: "We start with documentation. We end with a registered warranty."
  steps:
    - number: 1
      title: "Hail Event — Call Within Days, Not Weeks"
      body: "Most homeowner policies have a claim filing window for storm events. The sooner you call, the cleaner the causation documentation. Waiting gives weather and time the chance to complicate what should be a straightforward claim."
