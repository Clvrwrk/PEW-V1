    - number: 2
      title: "Free Hail Damage Inspection & Documentation"
      body: "We inspect the full shingle field, ridge, gutters, flashing, fascia, and any penetrations. We photograph every damage indicator and produce a written report with damage density, affected material, and our scope recommendation. This report is your insurance documentation."
      icon: "search"
    - number: 3
      title: "Insurance Claim Coordination"
      body: "We coordinate the adjuster inspection, attend the visit, and review the carrier's estimate against our scope. When the estimate is incomplete, we file a supplement request. See our dedicated <a href=\"/residential/insurance-claim-assistance\">insurance claim assistance</a> page for the full process breakdown."
      icon: "file-text"
    - number: 4
      title: "Targeted Repair or Full Replacement"
      body: "Isolated hail damage in a young shingle field gets a targeted repair. Widespread granule loss and bruising in a field over 15 years old — or damage covering more than 30–40% of the roof — typically makes a <a href=\"/residential/roof-replacement\">full roof replacement</a> the better investment. We document the recommendation before you sign."
      icon: "wrench"
