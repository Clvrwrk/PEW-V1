damage_guide:
  id: "damage-guide"
  eyebrow: "HOW TO TELL IF HAIL DAMAGED YOUR ROOF"
  h2: "Five Indicators. Most Are Visible from the Ground."
  body_intro: |
    Hail damage is easy to miss if you don't know what to look for — and it doesn't
    always look like the dents homeowners expect. Here are the five indicators our
    crews check first on every post-storm inspection.
  indicators:
    - number: 1
      title: "Granule Loss on Asphalt Shingles"
      body: "Check your gutters and downspout discharge area after a hail event. Excessive granule accumulation — the small sand-like particles that cover asphalt shingles — indicates impact damage. On the roof, bruised shingles will show bare or thin spots where the granules have been knocked loose. Granule loss accelerates UV degradation and reduces the shingle's remaining service life."
    - number: 2
      title: "Dented Gutters and Downspouts"
      body: "Metal gutters and downspouts are the easiest hail damage indicators from ground level. Fresh dents from a recent storm are distinguishable from older weathering by their pattern, density, and the absence of oxidation. If your gutters show impact dents, your roof almost certainly absorbed the same event."
    - number: 3
      title: "Cracked or Split Shingles"
      body: "Large hailstones can crack asphalt shingles on impact. The crack may not penetrate the underlying mat immediately, but it creates a stress fracture that fails under subsequent weather. On older shingles, brittleness from UV exposure makes cracking more likely at smaller hail sizes."
    - number: 4
      title: "Impact Bruising on Asphalt"
      body: "Hail bruising on asphalt shingles appears as soft spots — depressions in the shingle mat that are visible and tactile on close inspection. From the ground, bruising is typically not visible; from the roof or a drone photograph, the pattern of impacts across the field gives a clear picture of storm density. This is the primary reason a professional inspection matters: bruising is the most common and most missed damage type."
    - number: 5
      title: "Exposed Decking or Broken Flashing"
      body: "Severe hail events — large stone size at high velocity — can breach shingles and expose the underlying decking, or displace flashing around chimneys, vents, and skylights. These are active water intrusion points that require immediate attention regardless of insurance claim timing."
  cta:
    label: "Get a Professional Hail Damage Assessment"
    href: "/contact?intent=hail-damage-inspection&source=hail-damage-guide"
    data_event_action: "cta-click"
    data_event_label: "guide-cta"
    data_event_category: "hail-damage-repair"
  image_slot:
    alt: "Pro Exteriors inspector reviewing hail impact bruising on asphalt shingles, close detail"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

damage_types_grid:
  eyebrow: "DAMAGE BY MATERIAL"
  h2: "Hail Looks Different on Different Roofing Materials."
  subhead: "What we inspect — and what we find — depends on what you have on your roof."
  cards:
    - id: "asphalt-hail"
      icon: "layers"
      h3: "Asphalt Shingles"
      body: |
        The most common material in Texas, Kansas, and Missouri. Asphalt shingles absorb
        hail impact as granule loss, bruising, and cracking. A hail event that damages
        30–40% of the shingle field is typically the threshold where replacement is the
        better economic decision over targeted repair.

        If you're replacing hail-damaged asphalt shingles, it's worth asking about
        <a href="/residential/asphalt-shingles">Class 4 impact-resistant shingles</a>.
        These carry a UL 2218 Class 4 rating — the highest impact resistance classification
        — and some insurance carriers offer premium discounts for Class 4 installations;
        check with your specific carrier.
    - id: "metal-hail"
      icon: "shield"
      h3: "Metal Roofing"
      body: |
        Metal roofs handle hail better than asphalt but are not immune. Standing seam
        panels can dent without losing weather performance — the seam integrity is what
        matters. Stone-coated steel systems can chip or lose coating adhesion on direct
        impact. Our inspection assesses whether damage is cosmetic or functional, and
        documents both for insurance purposes.
    - id: "tile-slate-hail"
      icon: "square"
      h3: "Tile & Natural Slate"
      body: |
        Tile and slate are brittle materials — they can crack or fracture under direct
        hail impact, and cracked tiles allow water under the field. Individual tile or
        slate replacement is possible and often preferable to full replacement when damage
        is isolated. We carry matching stock for common tile profiles; natural slate
        matching is material-specific and may require sourcing. Our inspectors identify
        the scope before any commitment is made.

