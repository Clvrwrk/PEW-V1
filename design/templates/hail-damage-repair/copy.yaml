insurance_band:
  eyebrow: "HAIL DAMAGE AND YOUR INSURANCE CLAIM"
  h2: "Hail Damage Is Typically Covered. The Documentation Is What Matters."
  body: |
    Standard homeowner insurance policies cover hail as a named peril. Whether a specific
    claim is approved — and for what dollar amount — depends on your policy deductibles,
    the adjuster's assessment, and the quality of the damage documentation.

    Pro Exteriors coordinates the adjuster inspection and reviews the carrier's estimate
    against our scope of work. When the initial payout falls short of the actual repair
    cost, we file a supplement request with your carrier. The earlier you call after a
    hail event, the cleaner the causation documentation. See our
    <a href="/residential/insurance-claim-assistance">insurance claim assistance</a>
    page for a full breakdown of how the process works.
  image_slot:
    alt: "Pro Exteriors crew conducting hail damage inspection on a residential roof"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

faq:
  eyebrow: "FREQUENTLY ASKED"
  h2: "Hail Damage Repair Questions, Answered."
  items:
    - q: "How soon after a hail storm should I get an inspection?"
      a: |
        Within 30–60 days of the event if possible, and sooner if you see any signs of
        active water intrusion. Most homeowner insurance policies have a claim filing window
        — some as short as one year, some shorter depending on state law and carrier terms.
        Delay creates two problems: the causation documentation becomes harder to establish,
        and secondary damage (mold, decking rot) that results from an uninspected breach
        may not be covered separately.

        If you had significant hail in your area in the last few weeks, it costs nothing
        to have an inspection and know where you stand. We conduct free hail damage
        assessments and will tell you honestly whether we see damage that warrants a claim.
        For active water intrusion, see our <a href="/residential/storm-damage-repair" class="underline hover:no-underline">storm damage repair</a>
        page for emergency response options.

    - q: "What does hail damage look like on different roofing materials?"
      a: |
        On asphalt shingles: granule loss, impact bruising (soft spots in the mat), and
        cracked or split shingle faces. On metal roofing: surface dents, coating loss on
        stone-coated systems, and dented panel seams. On tile and slate: cracks, chips,
        and fractures — tile is a brittle material and hail can crack it cleanly even
        without the impact leaving a visible indentation.

        The damage indicators on your gutters and downspouts — fresh dents, granule
        accumulation in the discharge area — are the most reliable ground-level signal
        that a professional inspection is warranted. See the five-indicator guide on this
        page for the full breakdown.

    - q: "Is hail damage covered by homeowners insurance?"
      a: |
        Yes, in most standard homeowner policies. Hail is a named peril in virtually all
        HO-3 policies, which is the most common form in the states we serve. What varies
        by policy and carrier is the deductible structure, whether there's a separate
        wind-and-hail deductible (common in high-risk states like Texas and Colorado), and
        the actual cash value vs. replacement cost value coverage terms.

        For most homeowners in Texas, Colorado, Kansas, Missouri, and Georgia, a qualifying
        hail event will result in the carrier covering the replacement cost of damaged
        materials minus the applicable deductible. The deductible is your responsibility
        and is not something a contractor can legally absorb or waive. Your policy
        documents will show whether you have a standard deductible or a percentage-based
        wind-and-hail deductible.

    - q: "Does Pro Exteriors file the insurance claim for hail damage?"
      a: |
        We coordinate the adjuster inspection and attend the visit on your behalf. We
        review the adjuster's written estimate and file supplement requests when scope is
        missing or undervalued. What we do not do is file the initial claim — that is your
        action as the policyholder.

        The claim process is: you contact your insurance carrier to report the event and
        open the claim. We then coordinate everything that involves the physical scope of
        the roof — the inspection, the adjuster meeting, the estimate review, and any
        supplement filings. See our <a href="/residential/insurance-claim-assistance" class="underline hover:no-underline">insurance claim assistance</a>
        page for a step-by-step breakdown of what we do and don't do in the claim process.

