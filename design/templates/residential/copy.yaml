  layout: "two-column"
  left_column:
    h2: "Local across five states. Not 'storm chasers.'"
    body: |
      The week after a hail storm, every homeowner in the affected zip codes
      gets a knock on the door from a contractor that arrived from out of
      state with a magnetic sign on the truck. Six months later, when the
      roof leaks, the truck is gone. We've watched it happen in every
      market we serve.

      Pro Exteriors is the opposite of that pattern. We have brick-and-mortar
      offices in Richardson TX, Euless TX, Greenwood Village CO, Wichita KS,
      Kansas City MO, and a satellite location serving Atlanta GA. We're
      licensed to operate as a residential roofing contractor in 16 states.
      The crew that installs your roof lives within driving distance of
      your house and is accountable to you when something needs follow-up —
      not via a 1-800 number that routes to whichever subcontractor is
      currently available.
    stats:
      - { value: "15+", label: "YEARS IN BUSINESS", marker: "[REPRESENTATIVE — confirm Pro Exteriors founding year before launch]" }
      - { value: "2,500+", label: "HOMES PROTECTED", marker: "[REPRESENTATIVE — confirm completed-project count from Pro Exteriors CRM before launch]" }
    links_woven:
      - { anchor: "see all service areas", target: "/service-area" }
  right_column:
    type: "testimonial-card"
    background: "deep navy"
    rating: 5
    quote: |
      Pro Exteriors was a lifesaver after the spring hail storm. They handled
      everything with our insurance, the crew was professional from the
      tear-off through the cleanup, and our roof looks better than the day
      we bought the house.
    attribution:
      name: "Michael S."
      location: "Pro Exteriors residential customer"
      avatar_slot: "testimonial-michael-s"
    marker: |
      [REPRESENTATIVE — NOT YET SOURCED. Real customer testimonial required per
      CLAUDE.md hard gate. Chris to provide either: (a) Michael S.'s real
      market and signed testimonial release, OR (b) a substitute real
