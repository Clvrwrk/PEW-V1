# aia4-copywriter manifest — Residential Roofing Contractor pillar
# Phase 2 deliverable. Drafted in Maren voice from the SEO source copy
# (Residentail Roofing Contractor.html) under the term-frequency / LSI / link
# constraints in seo-validator-manifest.yaml and page-link-manifest.yaml.
#
# Phase 0 decisions reflected:
#   • National framing — every DFW/North Texas/Frisco/Plano/Southlake/McKinney
#     reference replaced. Five-state and 16-state-licensure framing instead.
#   • Dual-track CTA hypothesis — hero, feature cards, FAQ, and final CTA all
#     route to two distinct intent paths (?intent=emergency vs ?intent=inspection).
#   • H1 stays "Residential Roofing Contractor"; body leans on "residential
#     roofing" frequency to capture the higher-volume secondary.
#   • Trust strip rating marked [REPRESENTATIVE — NOT YET SOURCED] until Chris
#     pulls the actual figure from the Google Business Profile.
#
# All [REPRESENTATIVE — NOT YET SOURCED] markers are intentional — they pass the
# CLAUDE.md hard gate while keeping placeholders honest.

page:
  slug: residential
  audience: residential-homeowner
  intent: mixed
  hypothesis: |
    Splitting the hero into two intent paths (Emergency Roof Repair vs. Plan Your
    New Roof) routes urgent storm-damage traffic and planned-replacement traffic
    into separate qualifying flows; sourced multi-state proof overcomes residential
    contractor skepticism. Targets: ≥30% lift in /residential → free-inspection-
    form completion within 90 days, AND top-5 organic for "residential roofing
    contractor" in served-state geos within 6 months.

