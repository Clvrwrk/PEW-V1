# ─── SECTION 9: Residential Roofing FAQ ───
faq:
  h2: "Residential roofing FAQ"
  subhead: "Five questions homeowners across our five states ask the most."
  schema_type: "FAQPage"
  items:
    - id: faq-1
      q: "How long does a roof replacement typically take?"
      a: |
        A standard single-family residential roof replacement runs one to two
        days for the install, assuming no structural decking repair is needed.
        Permit issuance adds one to five business days depending on the
        municipality. Total project timeline from signed contract to final
        inspection is typically seven to fourteen days, weather permitting.
        We schedule around forecasted rain windows and communicate any delay
        the same day it surfaces. For the deeper timing breakdown, see our
        guide on the
        <a href="/blog/best-time-of-year-to-replace-your-roof">best time of year
        to schedule a roof replacement</a>.
    - id: faq-2
      q: "Will my insurance cover a new roof after a hail storm?"
      a: |
        Coverage depends on your policy type — RCV (replacement cost value)
        pays the full replacement minus your deductible, ACV (actual cash
        value) depreciates the payout based on roof age. Either way, document
        damage immediately after a storm; most carriers enforce a one-year
        filing window and some enforce 180 days. We handle insurance
        documentation, adjuster meetings, and supplement filings as part of
        the project — not as an upsell. Hail damage repair claims are the
        single most common residential job we run across Texas, Kansas, and
        Colorado.
    - id: faq-3
      q: "Do you provide a warranty on your work?"
      a: |
        Two warranties on every job. The manufacturer warranty (GAF
        System-Plus or Golden Pledge, Owens Corning Platinum, depending on
        material spec) is registered in the homeowner's name and covers the
        materials. The Pro Exteriors craftsmanship warranty covers the
        installation labor — lifetime on most products, transferable to the
        next owner if you sell the house. Property-linked records make the
        transfer simple.
    - id: faq-4
      q: "Should I repair or replace my roof?"
      a: |
        Three deciding factors: roof age, damage pattern, and shingle
        granule loss. A roof under ten years old with isolated damage is
        usually a repair candidate. A roof over twenty years old with
        widespread granule loss, multiple leak points, or hail hits across
        more than 30% of the field is typically a replacement. The free
        inspection and photo report give you the answer in writing, not as
        a sales pitch. For the deeper diagnostic, read our breakdown of the
        <a href="/blog/5-signs-replacement">five signs your roof is past
        repair</a>.
    - id: faq-5
      q: "What's the difference between a residential roofing contractor and a 'storm chaser'?"
      a: |
        A residential roofing contractor maintains a permanent local
        presence — physical office, in-state license, named project
        manager, warranty you can call on a year from now. A storm chaser
        flies in from another state after a major storm, maximizes door-knock
        volume in the affected zip codes, subcontracts the install to whoever
        is available, and is gone before the warranty matures. Pro Exteriors
        operates from brick-and-mortar offices in TX, CO, KS, MO, and a
        satellite serving GA — the crew that installs your roof works for
        Pro Exteriors, not for a labor broker.

