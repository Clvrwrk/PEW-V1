# ─── SECTION 3: Dual feature cards (URGENT vs PREMIUM) ───
dual_feature_cards:
  background: "neutral page"
  card_emergency:
    badge: { label: "URGENT RESPONSE", style: "danger-pill" }
    h3: "Roof damage? We're on it in 48 hours."
    body: |
      Storm hits, roof leaks, deductible just doubled. Our emergency roof
      repair crews are deployed from each of our five state markets — Texas,
      Colorado, Kansas, Missouri, and Georgia — so the response time isn't
      contingent on a truck driving in from somewhere else. Tarp installation
      happens first, full assessment follows, insurance documentation comes
      with us in the door.
    cta:
      label: "Request Inspection"
      href: "/contact?intent=emergency&source=residential-pillar-emergency-card"
      intent: "emergency-conversion"
    image_slot: "feature-emergency"
    image_alt: "Real Pro Exteriors crew installing a blue tarp on a storm-damaged residential roof — gritty, in-progress, not staged"
    links_woven:
      - { anchor: "emergency roof tarping", target: "/residential/tarp-installation" }
  card_premium:
    badge: { label: "PREMIUM UPGRADE", style: "neutral-pill" }
    h3: "Planning your dream roof"
    body: |
      The other half of residential roofing is the planned project — the
      twenty-year-old shingles you've been watching, the tile-to-metal
      conversion you've been pricing, the architectural shingle upgrade your
      HOA finally approved. We bring the same crews, the same warranties,
      and the same transparent pricing to the planned side as the emergency
      side. Consultative material selection, not a sales pitch.
    cta:
      label: "View Materials"
      href: "/residential/asphalt-shingles"
      intent: "education-conversion"
    image_slot: "feature-premium"
    image_alt: "Real Pro Exteriors completed residential project — modern home exterior with new architectural shingles, sun on the roof line"
  links_woven_card_premium:
    - { anchor: "asphalt shingle roofing systems", target: "/residential/asphalt-shingles" }

# ─── SECTION 4: Specialized Residential Services (6-card grid) ───
service_grid:
  eyebrow: null
  h2: "Specialized Residential Services"
  subhead: |
    Six service categories, one residential roofing contractor accountable for
    every one. Premium materials, manufacturer-certified installation, and a
    crew that's worked storms in every climate from the Texas heat to a
    Colorado high-wind belt to a Georgia humidity cycle.
  cards:
    - id: asphalt-shingles
      h3: "Asphalt Shingles"
      body: |
        The most-installed residential roofing material in North America and
        the right answer for the majority of homes we touch. We install GAF
        and Owens Corning architectural shingles with the manufacturer's full
        warranty paperwork attached — not a builder-grade three-tab pretending
        to be premium. Class 4 impact-rated upgrade available in hail-belt
        markets like Wichita and Denver.
      link: { anchor: "asphalt shingle roofing systems", target: "/residential/asphalt-shingles" }
      image_slot: "service-asphalt"
      image_alt: "Close-up of properly installed architectural asphalt shingles on a residential roof, showing exposure pattern and ridge cap detail"
    - id: metal-roofing
      h3: "Metal Roofing"
      body: |
        Standing-seam metal is the highest-performing residential roof we
        install — energy-efficient, hail-resistant, with a 50-year service
        life that outlasts most homeowners' time in the house. Premium
        upfront, but the math works on a long-tenure home in a high-hail
        market. We install Galvalume, painted steel, and copper.
      link: { anchor: "metal roofing for homes", target: "/residential/metal-roofing" }
      image_slot: "service-metal"
      image_alt: "Standing-seam metal roof on a residential home, raised rib detail catching afternoon light"
    - id: tile-clay
      h3: "Tile & Clay"
      body: |
        Mediterranean and Spanish-tile aesthetics, fireproof construction, and
        a service life that can exceed 75 years on the right structural deck.
        Tile is heavy — we verify the framing carries the load before we
        quote. Common in upscale residential builds across our Texas and
        Atlanta markets.
      link: { anchor: "tile and clay roofing options", target: "/residential/tile-clay-roofing" }
      image_slot: "service-tile"
      image_alt: "Spanish clay tile residential roof with detailed flashing at the ridge"
    - id: natural-slate
      h3: "Natural Slate"
      body: |
        The top of the residential roofing material pyramid. Quarried slate
        roofs routinely outlive the home around them. Cost matches longevity —
        slate is a generational investment, not a 15-year decision. We're
        certified to install Vermont, Pennsylvania, and Spanish slate.
      link: { anchor: "natural slate installation", target: "/residential/natural-slate" }
      image_slot: "service-slate"
      image_alt: "Natural slate residential roof, varied gray tones, in late-day sunlight"
    - id: gutters
      h3: "Gutters"
      body: |
        Seamless aluminum gutter systems sized for actual residential roof
        pitch and rainfall load. We install five-inch standard and six-inch
        oversized systems, with leaf guards and downspout extensions
        engineered to handle the storm runoff in any of our markets — from
        Texas summer downpours to Kansas spring squalls.
      link: { anchor: "seamless gutter systems", target: "/residential/seamless-gutters" }
      image_slot: "service-gutters"
      image_alt: "Newly installed seamless aluminum gutter on a residential home, downspout detail visible"
    - id: siding
      h3: "Siding"
      body: |
        Fiber-cement and vinyl siding in coordinated colors and profiles —
        often quoted alongside roof replacement on storm-damage jobs because
        the same hailstorm that damages a roof usually damages the siding too.
        We bundle the work and the insurance documentation rather than asking
        the homeowner to manage two contractors.
      link: { anchor: "fiber-cement and vinyl siding", target: "/residential/siding" }
      image_slot: "service-siding"
      image_alt: "Fiber-cement siding installation on a residential exterior, board-and-batten profile detail"

