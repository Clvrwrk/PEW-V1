# ─── Always required ───
slug: residential
template: pillar
location: null                     # National pillar; geo neutralized per Phase 0 decision
target_keyword: "residential roofing contractor"
secondary_keywords:
  - residential roofing
  - residential roofing company
audience: residential-homeowner
intent: mixed                      # solution-aware + transactional (dual hero CTAs reflect this)
hypothesis: |
  Splitting the hero into two intent paths (Emergency Roof Repair vs. Plan Your
  New Roof) routes urgent storm-damage traffic and planned-replacement traffic
  into separate qualifying flows, and a sourced multi-state proof block
  (15+ years, 2,500+ homes, real testimonials, real project galleries from
  TX/CO/KS/MO/GA) overcomes residential contractor skepticism. Together they:
    (a) lift /residential → free-inspection-form completion ≥30% within 90 days
        vs. the current thin-page baseline, AND
    (b) move organic ranking for "residential roofing contractor" into the top
        5 organic results in served-state geos within 6 months.
  This is a dual-metric hypothesis — both gates must hit for the build to be
  considered successful at the 6-month review.

