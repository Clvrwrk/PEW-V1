# ─── Build flags raised at intake ───
flags:
  - id: figma-geo-mismatch
    severity: critical
    message: |
      The Figma design is anchored to DFW / North Texas (hero "Residential
      Roofing DFW", proof block "DFW Metroplex", case studies all Plano /
      Southlake / McKinney TX, footer "DFW Service Center"). Phase 0 decision
      (Chris, 2026-05-03): NEUTRALIZE all DFW language and rebuild as the
      national residential pillar. Layout skill must preserve structural
      composition (hero split, dual CTAs, services grid, proof block, process
      strip, case study triptych, financing band, FAQ, final CTA, footer) but
      replace ALL DFW-specific copy and imagery with multi-state framing.
      Copywriter is the source of truth for new strings; layout is forbidden
      from carrying through any literal DFW string from the Figma code dump.
  - id: case-study-images-cross-market
    severity: warning
    message: |
      Case study triptych currently shows Plano TX / Southlake TX / McKinney TX.
      Per Phase 0 geo decision, replace with one representative project from
      each region (TX, CO, KS, MO, GA — pick the three strongest). image-gen
      must check /brand-assets/client/_INVENTORY.md for real photos before
      generating; gaps get [REPRESENTATIVE — NOT YET SOURCED] markers.
  - id: thin-secondary-keywords
    severity: warning
    message: |
      Only 2 secondary keywords ("residential roofing", "residential roofing
      company"). aia4-seo-validator Phase 1 will backfill LSI breadth from
      DataForSEO related-keywords (storm damage repair, roof replacement,
      tarp installation, asphalt shingles, GAF Master Elite, hail damage,
      insurance claims) — the SEO writer body already touches most of these.
  - id: storm-hail-content-gap
    severity: info
    message: |
      Per memory: storm/hail is under-represented in current Pro Exteriors
      content. The Phase 0 hypothesis dual-track hero deliberately surfaces
      Emergency Roof Repair as a top-level CTA. seo-validator should weight
      term-frequency targets toward storm/hail/insurance terms to close this
      gap, since this page becomes the entry point for that category.
  - id: first-of-template
    severity: info
    message: |
      First residential-pillar template. Layout components built here become
      the reusable base for sub-services (storm damage, roof replacement,
      tarp installation, gutters, siding, etc.) and any future residential
      neighborhood pages.
  - id: combined-hypothesis
    severity: info
    message: |
      Dual-metric hypothesis = stricter QC. aia4-page-qc must verify both
      conversion-tracking wiring (form events on BOTH hero CTAs separately)
      AND keyword-ranking schema completeness for "residential roofing
      contractor" + the two secondaries.

