  - "Office-page directory does not match the office-locations memory (Richardson TX, Euless TX, Greenwood Village CO, Wichita KS, Kansas City MO, Atlanta). The existing files are DFW-region only. Don't link to specific office pages from this pillar until the office-page reconciliation happens."
  - "11 of 19 required inbound links are not yet possible because the destination service pages don't exist. PageBuilder Phase 6 must list these as the post-launch backlog tied to M2/M3/Q2/Q3."
