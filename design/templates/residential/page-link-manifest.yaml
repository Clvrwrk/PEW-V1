# ─── Anchor-text density check (Kyle Roof: total internal body links 8–15 + 4–6 related + 2–3 CTA) ───
density_check:
  body_links: 14
  related_services_band_links: 6
  cta_links: 3
  cross_pillar_links: 1
  total_outbound: 24
  ceiling_per_skill_md: "8–15 body + 4–6 related + 2–3 CTA = 14–24 total"
  status: at-ceiling
  read: |
    24 outbound links is at the high end of the Kyle Roof ceiling for a pillar.
    A pillar warrants more than a service page (it's the silo hub); 24 is acceptable
    for a 2,400-word pillar. If page-qc flags as boilerplate-risk, the first cut
    is the city-page link and the 'see all service areas' link (those duplicate
    the multi-state proof block's intent and can be consolidated to one).

# ─── Per-target-anchor-count rule (no destination receives >3 anchors from this page) ───
per_target_audit:
  /contact?intent=*: 2 distinct URLs (one inspection, one emergency) — within rule
  /commercial-roofing: 1 — within rule
  /residential/* (services): 1 each — within rule
  /blog/* (supporters): 1 each — within rule
  /residential/dallas: 1 — within rule
  status: pass

# ─── Status ───
status: success
warnings_count: 1
critical_count: 0
warnings:
