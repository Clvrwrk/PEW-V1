  source_file: "uploads/Residentail Roofing Contractor.html"
  visible_words: 2424
  per_target_status:
    "residential roofing contractor": fail        # 2 vs target 5–8 — Phase 2 must add 3–6
    "residential roofing":           pass        # 18 vs target 16–22 — on target
    "residential roofing company":   fail        # 0 vs target 3–5 — Phase 2 must add
    contractor:                      pass        # 13 vs target 10–16
    residential:                     pass        # 19 vs target 18–28
    roofing:                         pass        # 70 vs target 55–75
    roof:                            pass        # 107 vs target 85–115
    storm:                           pass        # 17 vs target 12–20
    hail:                            fail        # 0 vs target 5–9 — CRITICAL gap
    inspection:                      pass        # 12 vs target 10–14
    warranty:                        warning     # 4 vs target 5–8
    gaf:                             pass        # 3 vs target 3–6
    "owens corning":                 fail        # 0 vs target 1–2
    "master elite":                  fail        # 0 vs target 1–2
    asphalt:                         warning     # 1 vs target 5–10 — service-grid expansion lifts
    metal:                           fail        # 0 vs target 5–10 — service-grid + case study lifts
    shingle:                         pass        # 9 vs target 8–14
    insurance:                       fail        # 1 vs target 5–10 — storm-narrative expansion
    deductible:                      fail        # 0 vs target 1–3
    tarp:                            pass        # 11 vs target 8–14
    state_moats:                     fail        # 0 each — Phase 2 must seed all five state names
    homeowner:                       pass        # 14 vs target 10–18
  overall_pass_rate: "10 pass / 2 warning / 11 fail"
  read: |
    The SEO writer's draft is solid raw material — pillar depth, on-cluster on the
    big terms (roof/roofing/contractor/residential), strong storm/tarp coverage.
    But it has 11 critical gaps that map cleanly onto the brief flags:
      1. Zero state-name mentions (Phase 0 geo-neutralization decision must be carried into copy).
      2. Zero hail mentions despite being THE entry-point page for the storm category.
      3. Zero "residential roofing company" or "Master Elite" or "Owens Corning" mentions.
      4. Insurance + deductible underweighted relative to commercial intent.
      5. Service-card terms (asphalt/metal) underweighted because the draft narrates
         the residential category abstractly rather than expanding the 6 service tiles.
    Phase 2 (copywriter) is briefed to fix all 11 — none of these requires a strategic
    pivot, just expansion of existing sections in the copy manifest.

# ─── Flags ───
flags:
  - id: primary_lower_volume_than_secondaries
    severity: warning
    message: |
      "Residential roofing contractor" (880 vol) is 14× lower volume than
      "residential roofing" (12,100 vol) and 3× lower than "residential roofing
      company" (2,900 vol). All three are LOW competition. Both secondaries also
      carry much higher CPCs ($22.69 / $20.79 vs. $8.18) → stronger commercial
      intent. The user picked the contractor variant as primary; we're honoring
      that for slug/H1/canonical (cleaner intent match for a contractor money
      page) but aggregating the page's body frequency around "residential
      roofing" as the volume driver. PageBuilder may want to surface this to
      Chris before Phase 2 — he might prefer to swap H1 emphasis or add a
      sub-headline that picks up the higher-volume secondary explicitly.

  - id: sparse_lsi_seed
    severity: info
    message: |
      DataForSEO related-keywords returned only 9 items for the target seed and
      9 for "residential roofing" — much thinner than the TPO build (60+ items).
      Hand-augmented with brief-driven terms (storm/hail/insurance, services,
      credentials, geo-moats). LSI breadth target: page hits ≥70% of the
      hand-augmented list at least once. Phase 5 page-qc must verify breadth.

  - id: aggregator_dominated_serp
    severity: warning
    message: |
      Top 8 organic results are mostly aggregators/directories (GAF, BBB, NRCA,
      Owens Corning) rather than contractor money pages. First contractor
      result is at rank 9. This means SERP TF cluster is statistically thin —
      only 5 contractor pages to average against, one of which (Jimmerson, 479
      words) is a cluster outlier. Treat the targets as directional, not
      gospel; lean toward Mid-South + White Castle behavior since they're the
      closest intent + word-count matches.

  - id: ratings_claim_unsourced
    severity: critical
    message: |
      Figma trust strip claims "Google 4.9/5 (240+ Reviews)". Per CLAUDE.md §4
      every claim has a receipt. Phase 2 must mark this as
      [REPRESENTATIVE — NOT YET SOURCED] until Chris confirms the actual figure
      from Pro Exteriors' Google Business Profile. AggregateRating schema
      cannot ship with unverified numbers — that's a Google penalty risk AND a
      hard-gate fail.

  - id: mid_south_targets_residential_roofing_company_specifically
    severity: info
    message: |
      Mid-South Roofing (rank 22) ranks specifically because their page targets
      "residential roofing company" head-on (11 mentions, vs. cluster mean 2.2).
      This validates that the secondary keyword is winnable through TF discipline
      alone. Phase 2 must hit 3–5 mentions to stay competitive without competing
      against our own primary.

