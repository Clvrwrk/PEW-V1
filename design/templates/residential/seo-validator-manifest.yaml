    - { kw: "residential roofing prices", vol: 10 }
  storm_emergency_cluster:
    - { kw: "hail damage repair", vol: 6600, comp: MEDIUM, cpc: 10.99 }
    - { kw: "emergency roof repair", vol: 5400, comp: LOW, cpc: 46.14, note: "$46 CPC = strongest commercial intent on page" }
    - { kw: "storm damage repair", vol: 3600, comp: LOW, cpc: 9.54 }
    - { kw: "insurance claim roof", vol: 1600, comp: LOW, cpc: 10.52 }
    - { kw: "tarp installation", vol: 90, comp: MEDIUM, cpc: 0.83 }
  service_specifics:
    - { kw: "roof replacement", vol: 49500, comp: LOW, cpc: 28.79 }
    - { kw: "roof inspection", vol: 40500, comp: LOW, cpc: 29.78 }
    - { kw: "asphalt shingles", vol: 49500, comp: MEDIUM }
    - { kw: "metal roofing", vol: 110000, comp: HIGH }
  brand_credentials:
    - { kw: "GAF Master Elite", vol: 880, comp: MEDIUM, cpc: 10.17 }
    - { kw: "Owens Corning roofing", vol: 22200, comp: HIGH }
  geographic_moats:
    - { kw: "TX | Texas", note: "State-level moat — competitors don't claim multi-state" }
    - { kw: "CO | Colorado", note: "State-level moat" }
    - { kw: "KS | Kansas", note: "State-level moat" }
    - { kw: "MO | Missouri", note: "State-level moat" }
    - { kw: "GA | Georgia", note: "State-level moat" }
  read: |
    DataForSEO `related-keywords` returned only 9 results for the target seed
    and 9 for "residential roofing" (sparse). LSI list above is hand-augmented
    with the storm/emergency, service-specific, and brand-credential clusters
    that the brief flags require. Coverage target: page hits ≥70% of these LSI
    terms at least once (Kyle Roof breadth-over-density rule).

# ─── Term-frequency targets (Kyle Roof: aim for the SERP cluster, not a guru's checklist) ───
# Method: 5 contractor competitors fetched and tokenized. Mid-South (rank 22) and
# White Castle (rank 17) carry highest interpretive weight — Mid-South because it's the
# closest intent match (residential-roofing-company landing page), White Castle because
# its 2,029 visible words is closest to our 2,400-word pillar.
# Cluster means: see term-frequency-raw.json `cluster_means_for_a_2400_word_pillar`.

term_frequency_targets:
  "residential roofing contractor":
    cluster_mean: 1.0
    target_range: "5–8"
    deliberate_overshoot: true
    read: |
      Cluster is sparse on the exact-match (only Mid-South hits it >1×). The exact-
      match keyword MUST appear in title (1×), meta description (1×), H1 (1×), the
      first 100 words of body (1×), and ≥3× more in body. This is a deliberate
      overshoot of the cluster — Kyle Roof rule: outranking a sparse cluster requires
      hitting the exact-match harder than the cluster does. Draft body is at 2 — needs
      Phase 2 boost to 5–8.

  "residential roofing":
    cluster_mean: 8.0
    target_range: "16–22"
    read: |
      Mid-South is the cluster anchor at 29 mentions. Draft is at 18 — already in
      range. Don't drop in Phase 2; if anything, push to 20.

  "residential roofing company":
    cluster_mean: 2.2
    target_range: "3–5"
    read: |
      Mid-South dominates this term (11 mentions) because they explicitly target
      "residential roofing company" as their primary. We're not — we're targeting
      "contractor". Hit 3–5 to stay competitive on the secondary without competing
      with our own primary anchor. Draft is at 0 — Phase 2 must add.

  contractor:
    cluster_mean: 7.6
    target_range: "10–16"
    read: "Draft at 13 — on target. Don't drop."

  residential:
    cluster_mean: 11.0
    target_range: "18–28"
    read: "Draft at 19 — on target."

  roofing:
    cluster_mean: 40.8
    target_range: "55–75"
    read: "Draft at 70 — perfectly on cluster ceiling. Hold."

  roof:
    cluster_mean: 67.2
    target_range: "85–115"
    read: "Draft at 107 — on target."

  storm:
    cluster_mean: 5.4
    target_range: "12–20"
    deliberate_overshoot: true
    read: |
      Per the storm-hail-content-gap brief flag, this page becomes the entry point
      for the under-represented storm category. Draft is at 17 — perfect. Cluster
      mean is 5.4; we deliberately go ~3× cluster.

  hail:
    cluster_mean: 1.0
    target_range: "5–9"
    deliberate_overshoot: true
    read: |
      Cluster barely mentions hail (mean 1.0). Draft is at 0 — CRITICAL miss.
      "Hail damage repair" is a 6,600-volume keyword with $10.99 CPC. Phase 2 MUST
      expand the storm/insurance section to introduce hail naturally 5–9 times.

  inspection:
    cluster_mean: 2.4
    target_range: "10–14"
    read: |
      Draft at 12 — on target. The 21-point inspection in the Figma "Free Inspection"
      step block keeps this naturally in range.

  warranty:
    cluster_mean: 1.4
    target_range: "5–8"
    read: |
      Draft at 4 — slightly under. The transferable-warranty section in the SEO
      writer body covers this — Phase 2 should not drop those mentions, ideally
      add 1–2 more.

  gaf:
    cluster_mean: 1.2
    target_range: "3–6"
    read: "Draft at 3 — on target. GAF Master Elite credentialing supports this."

  "owens corning":
    cluster_mean: 0.2
    target_range: "1–2"
    read: |
      Draft at 0. The Figma trust strip surfaces 'CERTIFIED OWENS CORNING' — Phase 2
      must mention Owens Corning 1–2× in body to honor the credential.

  "master elite":
    cluster_mean: 0.0
    target_range: "1–2"
    read: |
      Cluster doesn't mention it. Pro Exteriors carries it (per Figma trust strip);
      mention 1–2× as authority signal. Draft at 0.

  asphalt:
    cluster_mean: 1.0
    target_range: "5–10"
    read: "Service-grid-driven. Draft at 1 — Phase 2 expansion of the Asphalt Shingles card will lift this."

  metal:
    cluster_mean: 3.4
    target_range: "5–10"
    read: "Service-grid-driven. Draft at 0 — Phase 2 must hit when expanding the Metal Roofing card and any standing-seam testimonial."

  shingle:
    cluster_mean: 4.2
    target_range: "8–14"
    read: "Draft at 9 — on target."

  insurance:
    cluster_mean: 0.6
    target_range: "5–10"
    deliberate_overshoot: true
    read: |
      Cluster hardly mentions insurance — wide-open positioning territory.
      "Insurance claim roof" is a 1,600-volume keyword. Draft is at 1 — Phase 2 must
      build insurance handling into the storm-emergency narrative naturally.

  deductible:
    cluster_mean: 0.0
    target_range: "1–3"
    read: |
      Cluster doesn't mention. Figma surfaces 'Insurance Deductible Assistance'
      in the financing band — Phase 2 must echo it 1–3× in body.

  tarp:
    cluster_mean: 0.0
    target_range: "8–14"
    deliberate_overshoot: true
    read: "Pro Exteriors-specific service. Draft is at 11 — perfect, hold."

  geographic_moats_TX_CO_KS_MO_GA:
    cluster_mean: ~0
    target_range: "Each state name 2–4× plus 'five states' phrasing 2–3×"
    read: |
      Per the Phase 0 figma-geo-mismatch decision, this page is the national
      pillar — drop ALL DFW language and lean into multi-state moats. Draft mentions
      none of TX/CO/KS/MO/GA. Phase 2 must seed each state name 2–4× across the
      hero, proof block, case study triptych, footer-area copy, and FAQ.

  homeowner:
    cluster_mean: ~0
    target_range: "10–18"
    read: "Audience-anchoring term. Draft at 14 — on target."

# ─── Schema types required ───
schema_types_required:
  - type: RoofingContractor
    required: true
    placement: "Page-level JSON-LD block"
    read: |
      Primary entity type for this page. Map to Pro Exteriors corporate entity.
      Include `@id`, `name`, `url`, `logo`, `image`, `telephone`, `priceRange`,
      `aggregateRating`, `areaServed` (state list), `hasOfferCatalog` (links to
      sub-services). For a national pillar, areaServed is the 5-state set, not
      a single AdministrativeArea.

  - type: Service
    required: true
    placement: "Each of the 6 service cards (Asphalt, Metal, Tile & Clay, Slate, Gutters, Siding) gets its own Service schema item, all linked back to the parent RoofingContractor"
    read: |
      Per Kyle Roof: schema is a quiet ranking lever. 6 distinct Service blocks
      with `serviceType`, `provider`, `areaServed`, and `offers` give the page
      richer SERP treatment than competitors who use generic content.

  - type: BreadcrumbList
    required: true
    placement: "Top of page, immediately after main schema"
    read: "Standard. Home > Residential."

  - type: FAQPage
    required: true
    placement: "Wraps the 4 FAQ accordion items"
    read: |
      All 4 FAQs already exist in the SEO writer body. Schema-mark each Question +
      acceptedAnswer. Google rewards FAQ schema with expanded SERP slots — this is
      a 'free' visibility win.

  - type: Review
    required: true
    placement: "Wraps the Michael S. testimonial in the Local Experts block"
    read: |
      Real testimonial from a real customer is a hard gate per CLAUDE.md §4.
      Schema must include `reviewRating`, `author`, `reviewBody`, `itemReviewed`.

  - type: LocalBusiness
    required: false
    placement: "DO NOT add to this page"
    read: |
      LocalBusiness blocks belong on each per-location landing page (Richardson TX,
      Euless TX, Greenwood Village CO, Wichita KS, Kansas City MO, Atlanta GA),
      NOT on this national pillar. Adding LocalBusiness here would dilute the
      national-entity signal RoofingContractor is establishing. Flag this for the
      assembly phase: Phase 4 must include `RoofingContractor` only, not
      `LocalBusiness`. Per-location pages will get their own LocalBusiness blocks
      in their own builds.

  - type: AggregateRating
    required: true
    placement: "Inside the RoofingContractor block"
    read: |
      Figma trust strip claims '4.9/5 (240+ Reviews)'. Per CLAUDE.md every claim
      has a receipt — Phase 2 page-qc must verify the 4.9/240+ figure with Chris
      before this AggregateRating ships, OR mark the figure as
      [REPRESENTATIVE — NOT YET SOURCED] and remove from schema until verified.

