# aia4-seo-validator manifest — Residential Roofing Contractor pillar
# Produced inline by PageBuilder Phase 1 on 2026-05-03
# Methodology: Kyle Roof on-page (term-frequency vs. SERP, LSI breadth, schema-as-signal)
# Source data: design/templates/residential/dataforseo-raw.json + term-frequency-raw.json

target_keyword:
  keyword: "residential roofing contractor"
  search_volume: 880
  cpc_usd: 8.18
  competition: LOW
  source: DataForSEO Google Ads search_volume/live (US 2840, 2026-05-03)
  read: |
    Modest-volume, LOW-competition longer-tail. The interesting strategic note
    is that the user-chosen primary is the LOWEST-volume term in the brief by
    a wide margin: "residential roofing" is 12,100 (14×) and "residential
    roofing company" is 2,900 (3×) — both also LOW competition with much
    higher CPCs ($22.69 / $20.79 vs. $8.18). The high CPC of the secondaries
    means stronger commercial intent. Keep "residential roofing contractor" as
    the slug-anchoring keyword for title/H1/canonical (cleaner SERP intent
    match), but treat "residential roofing" as the volume-driver in body
    frequency and as the H2-level keyword. See `flags.primary_lower_volume_than_secondaries`.

primary_secondaries:
  - keyword: "residential roofing"
    search_volume: 12100
    cpc_usd: 22.69
    competition: LOW
    read: "Volume monster, LOW competition, very high CPC. Will drive most organic traffic to this page. Use as H2 keyword and as the highest-frequency body term among the three."
  - keyword: "residential roofing company"
    search_volume: 2900
    cpc_usd: 20.79
    competition: LOW
    read: "Strong supporting term. Roofing-by-Mid-South ranks #22 specifically because they nailed this term (11 mentions vs. cluster mean 2.2). Treat as a credibility/branded-anchor variant — use 3–5× in body."

