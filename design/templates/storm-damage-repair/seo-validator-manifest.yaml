# aia4-seo-validator manifest — Storm Damage Repair
# Phase 1 · 2026-05-03

target_keyword:
  keyword: "storm damage roofing"
  search_volume: 4400
  cpc_usd: 44.87
  competition: LOW
  read: |
    Highest CPC in the residential silo at $44.87. Transactional emergency intent —
    homeowner has active damage and is looking for a contractor today, not researching.
    LOW competition at 4,400 volume is the clearest fast-ranking opportunity on the
    site. Page must load fast, lead with action (call, tarp, inspect), and reduce
    perceived wait time. Every section exists to move the homeowner toward contact —
    not to educate them about roofing.

primary_secondaries:
  - keyword: "storm damage roof repair"
    search_volume: 3600
    cpc_usd: 31.20
    competition: LOW
    read: "Near-exact variant. H1, meta, and first 100 words."
  - keyword: "emergency roof repair"
    search_volume: 8100
    cpc_usd: 18.40
    competition: MEDIUM
    read: "Broader emergency term — use in trust strip and FAQ. MEDIUM comp means we seed it but don't force it into H1."
  - keyword: "storm damage roofing contractor"
    search_volume: 880
    cpc_usd: 38.60
    competition: LOW
    read: "Highest commercial intent modifier — seed in service overview and schema serviceType."
  - keyword: "wind damage roof repair"
    search_volume: 2900
    cpc_usd: 22.10
    competition: LOW
    read: "Wind-specific variant — anchors Wind Damage card in damage types grid."
  - keyword: "roof repair after storm"
    search_volume: 1600
    cpc_usd: 14.80
    competition: LOW
    read: "Long-tail variant — seed in body copy and FAQ."

