damage_types:
  eyebrow: "WHAT WE REPAIR"
  h2: "Three Types of Storm Damage. One Call."
  subhead: "Pro Exteriors residential roofing contractors handle all three in the states we serve."
  cards:
    - id: "wind-damage"
      icon: "wind"
      h3: "Wind Damage"
      urgency: "Moderate — Water Intrusion Risk"
      body: |
        Missing shingles, lifted tabs, blown ridge cap, and torn flashing are the most
        common wind damage patterns we see in Texas, Kansas, and Missouri. Each is an
        active water intrusion point. Wind damage repairs restore the weather envelope
        before secondary damage — decking rot, interior mold, insulation degradation —
        compounds the repair cost.
    - id: "hail-damage"
      icon: "cloud-rain"
      h3: "Hail Damage"
      urgency: "High — Insurance Claim Window Applies"
      body: |
        Hail damage is the leading claim driver in Texas, Colorado, and Kansas. Impact
        bruises, granule loss, and cracked shingles are often invisible from ground
        level but detectable immediately on a professional inspection. Most insurance
        policies have a claim filing window after a hail event — don't wait weeks
        to call for an assessment. See our <a href="/residential/hail-damage-repair">hail damage repair</a> page
        for a dedicated breakdown.
    - id: "tree-impact"
      icon: "tree"
      h3: "Tree & Debris Impact"
      urgency: "Critical — Structural Assessment Required"
      body: |
        A direct tree impact can breach the decking and require structural repair
        beyond shingle replacement. Emergency tarping is always the first step.
        Once the site is safe and dry, we assess decking integrity, rafter condition,
        and the full shingle field before scoping the repair. Do not attempt to remove
        a large tree from your roof without professional equipment — secondary damage
        is common.

