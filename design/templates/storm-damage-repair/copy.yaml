immediate_steps:
  id: "immediate-steps"
  eyebrow: "RIGHT NOW"
  h2: "Storm Just Hit. Here's What to Do Before You Call Anyone."
  steps:
    - number: 1
      title: "Document Everything"
      body: "Take photos of every piece of visible damage from ground level — don't get on the roof yourself. Photograph the yard debris, the gutters, any interior ceiling or wall staining. Timestamp every photo. This documentation is the foundation of your insurance claim."
    - number: 2
      title: "Stop the Water with a Temporary Tarp"
      body: "If there's active water intrusion, interior damage compounds every hour. Emergency tarping protects your structure and your insurance claim. We offer <a href=\"/residential/tarp-installation\">emergency roof tarping</a> as a standalone service — it is not contingent on you committing to a repair or replacement."
    - number: 3
      title: "Get a Professional Damage Assessment"
      body: "Your insurance carrier will send an adjuster. Having a contractor's independent damage report — with photos and written findings — before that visit is not optional if you want the full scope documented. We conduct free storm damage assessments within 24–48 hours of contact."
