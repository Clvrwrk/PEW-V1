insurance_band:
  eyebrow: "STORM DAMAGE AND YOUR INSURANCE CLAIM"
  h2: "Your Claim Is Part of the Job. We Handle Our Side of It."
  body: |
    Storm damage repairs and insurance claims run on parallel tracks. Most homeowners
    manage the claim process — adjuster scheduling, estimate review, supplement filing —
    while also managing a damaged property and a family. That's a second job they didn't
    sign up for.

    Pro Exteriors coordinates the adjuster inspection, reviews the carrier's estimate
    for completeness, and files supplement requests when scope is missing. We do not
    act as your public adjuster — that is a separate licensed role. What we do is make
    sure the contractor's scope is documented completely so your carrier pays for the
    full repair.

    For a complete breakdown of what the insurance claim process looks like from our
    side, see our <a href="/residential/insurance-claim-assistance">insurance claim assistance</a> page.
  image_slot:
    alt: "Pro Exteriors project manager and homeowner reviewing storm damage insurance estimate"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

faq:
  eyebrow: "FREQUENTLY ASKED"
  h2: "Storm Damage Repair Questions, Answered."
  items:
    - q: "How quickly can Pro Exteriors respond after a storm?"
      a: |
        We conduct free storm damage assessments within 24–48 hours of contact in all
        five states we serve. Emergency tarping, when needed to stop active water
        intrusion, is scheduled as quickly as same-day or next-day depending on crew
        availability and weather conditions at the site.

        High-volume storm events — a hail corridor that hits thousands of homes in a
        single day — compress our scheduling. In those situations, we prioritize by
        severity of damage and active water intrusion risk. Call or request an
        inspection online and we will tell you the current response window honestly.

    - q: "Will you work directly with my insurance adjuster?"
      a: |
        Yes. We coordinate the adjuster inspection schedule, attend the inspection, and
        review the carrier's estimate against our scope of work. When the adjuster's
        estimate is incomplete or undervalues the damage, we prepare a supplement
        request and file it with your carrier.

        See our <a href="/residential/insurance-claim-assistance" class="underline hover:no-underline">insurance claim assistance</a>
        page for the full process breakdown. The short version: we handle our side of
        the claim process; you handle the policy and the deductible.

    - q: "What if I already have a temporary tarp — do I still need an inspection?"
      a: |
        Yes. A tarp stops water intrusion; it does not document the damage beneath it.
        Your insurance carrier needs a professional damage report — not a tarp receipt —
        to process the claim accurately. The inspection also catches damage the tarp
        doesn't cover: perimeter flashing, gutters, fascia, soffit, and any decking
        compromise that won't be visible until the shingles are removed.

        If you need <a href="/residential/tarp-installation" class="underline hover:no-underline">emergency roof tarping</a>
        as a standalone service before the inspection, we offer that separately.

    - q: "What counts as storm damage for an insurance claim?"
      a: |
        Most homeowner policies cover direct physical loss from wind, hail, lightning,
        and falling objects (tree limbs). What qualifies depends on your specific
        policy language, your carrier, and the evidence of causation.

        What we document at the inspection: hail impact bruising and granule loss,
        missing or lifted shingles, torn or displaced flashing, cracked ridge cap,
        gutter dents, and any structural damage from falling objects. This
        documentation is what your adjuster uses to determine covered scope — which
        is why having a contractor's independent report before the adjuster arrives
        matters. We attend the adjuster inspection with that report in hand.

