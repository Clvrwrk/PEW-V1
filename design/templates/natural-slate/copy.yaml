service_overview:
  eyebrow: "A DIFFERENT KIND OF ROOFING DECISION"
  h2: "Natural Slate Is Not a 25-Year Roof. It Is a 100-Year Decision."
  body: |
    Natural slate is quarried stone — split along natural cleavage planes to produce
    tiles that are dense, non-porous, and resistant to the weathering mechanisms
    that degrade other roofing materials. Hard slate from Vermont and Pennsylvania,
    correctly installed, has documented lifespans of 100–150 years. Soft slate
    (from Virginia, Georgia, and international sources) runs 60–125 years depending
    on the deposit. Either way, a natural slate installation is the last roof
    most homeowners ever put on a home they intend to keep.

    The trade-offs are real and worth stating directly. Natural slate is the heaviest
    common roofing material — 14–18 lbs per square foot versus 2–4 lbs for asphalt
    shingles and 9–12 lbs for clay tile. Not every home's roof framing can support
    that load without structural reinforcement. The feasibility assessment that opens
    every Pro Exteriors slate project is not a formality — it determines whether
    natural slate is viable on your home at all, and if reinforcement is required,
    what that scope entails before material is ordered.

    If your home can't support natural slate, synthetic slate alternatives — which
    replicate the appearance at roughly one-quarter the weight — may be a viable
    option depending on your priority (permanence vs. aesthetics). We'll tell you
    where you stand at the assessment.
  cta:
    label: "Request Your Slate Roof Feasibility Assessment"
    href: "/contact?intent=slate-assessment&source=natural-slate-overview"
    data_event_action: "cta-click"
    data_event_label: "overview-cta"
    data_event_category: "natural-slate"
  image_slot:
    alt: "Natural Vermont slate tiles installed on a historic home — Pro Exteriors"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

slate_types_grid:
  eyebrow: "SLATE VARIETIES"
  h2: "Hard Slate, Soft Slate, and Synthetic. What Each Option Delivers."
  cards:
    - id: "hard-slate"
      icon: "mountain"
      h3: "Hard Slate (Vermont / Pennsylvania)"
      body: "The premium natural option — quarried from the dense geological formations of Vermont and Pennsylvania. Hard slate has a documented lifespan of 125–150 years in favorable climates, higher density (greater resistance to impact), and a color range from the deep grays of Unfading Green and Purple-Gray to the classic blue-grays of Bangor Unfading. Higher cost than soft slate; unmatched permanence."
      badge: "125–150 yr"
    - id: "soft-slate"
      icon: "layers"
      h3: "Soft Slate (Virginia / International)"
      body: "Softer slate from Virginia, Georgia, and international deposits (Spain, Wales) runs 60–125 years depending on the specific deposit and installation conditions. Lower cost than hard Vermont and Pennsylvania slate, with a similar appearance. A viable choice when budget requires compromise between natural slate's permanence and synthetic slate's cost efficiency. Still significantly longer-lived than any other residential roofing material."
      badge: "60–125 yr"
    - id: "synthetic"
      icon: "shield"
      h3: "Synthetic Slate"
      body: "Not natural slate — but worth understanding as an option for homes where the structural load of natural slate is not feasible. Synthetic slate products are manufactured from recycled rubber and plastics, weigh approximately 4–6 lbs per square foot (comparable to asphalt), and replicate natural slate's appearance. Lifespan is typically 40–60 years. Confirm with Pro Exteriors that synthetic slate is available for your project before including this in your scope discussions."
      badge: "Structural Fallback"
      flag: "Confirm synthetic slate availability with Pro Exteriors before ship"

