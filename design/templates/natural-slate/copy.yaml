investment_band:
  eyebrow: "THE INVESTMENT"
  h2: "Not Cheap. But the Last Roof They'll Ever Need — and the Per-Year Math Proves It."
  body: |
    Natural slate is the most expensive residential roofing material in common use.
    The material itself costs more than asphalt, tile, or metal. The installation is
    more labor-intensive and requires specialist crews. The structural work, if needed,
    adds to the total. There is no version of this that is inexpensive upfront.

    The per-year cost calculation changes the picture. A hard slate installation
    that costs 4× an asphalt roof but lasts 5× as long has a lower per-year ownership
    cost before accounting for the two additional tear-offs, disposal costs, and
    re-installations an asphalt timeline requires over 125 years. And slate doesn't
    degrade over time the way asphalt does — a 100-year-old Vermont slate roof isn't
    "almost used up." It's middle-aged.

    Financing is available for qualified projects. For homeowners who want the
    permanence story without the slate price point, the
    <a href="/residential/tile-clay-roofing">clay and tile roofing</a> page covers the
    next tier down. For a full comparison of material options, see
    <a href="/residential/roof-replacement">roof replacement</a>.
  image_slot:
    alt: "Natural slate roof close-up — Pro Exteriors installation, Vermont hard slate"
    src: "[REPRESENTATIVE — NOT YET SOURCED]"

faq:
  eyebrow: "FREQUENTLY ASKED"
  h2: "Natural Slate Roofing Questions, Answered."
  items:
    - q: "Is natural slate the most expensive roofing material?"
      a: |
        Yes, among commonly installed residential roofing materials, natural slate
        is at the top of the cost range. Material costs are higher than asphalt,
        metal, or clay tile. Installation requires specialist labor and takes longer.
        Structural reinforcement, if needed, adds to the total project cost.

        The per-year cost comparison tells a different story. Hard slate from Vermont
        or Pennsylvania has documented 125–150 year lifespans. An asphalt shingle
        replacement cycle runs 25–30 years. Over 125 years, a slate installation
        eliminates four complete roof replacement cycles — plus the associated tear-off
        costs, dump fees, and disruption of each replacement. For homeowners planning
        to hold a property long-term, the economics of slate become defensible at the
        whole-project level. For homeowners planning to sell in the near term, it does
        not pencil.

    - q: "How do I know if my home can support slate?"
      a: |
        You need a structural assessment from a contractor trained on slate load
        requirements — which is step one of every Pro Exteriors natural slate project.
        Natural slate runs 14–18 lbs per square foot. The key structural variables
        are rafter size, rafter span, and the current condition of the roof decking.
        Homes built for asphalt shingles (framed for 2–4 lbs per square foot) may
        require rafter reinforcement, additional decking support, or re-framing of
        specific spans to handle the load.

        Some homes are straightforward candidates. Some require modest reinforcement.
        Some are not viable for natural slate under any reasonable investment threshold —
        and in those cases, synthetic slate (at 4–6 lbs per square foot) may be
        an alternative if the aesthetic is the priority. We tell you which category
        you're in at the assessment, not after material is sourced.

    - q: "Can slate roofing be repaired, or does it have to be fully replaced?"
      a: |
        Individual slate tiles can be replaced without replacing the full roof —
        this is one of slate's practical advantages. If a tile is cracked or broken
        from impact or settling, a qualified slate installer can remove the damaged
        tile and set a new one without disturbing the surrounding slates.

        The limiting factor is matching the original slate material. Vermont hard slate
        has a specific color, texture, and thickness. If your existing roof used a
        distinctive slate variety, sourcing matching replacement tiles can require
        some lead time or specialist sourcing. Pro Exteriors maintains supplier
        relationships with quarries and slate distributors for exactly this reason.

        Full replacement becomes the right call when the slate has reached the end
        of its service life (soft slate that has begun to spall and delaminate),
        when the original installation was done incorrectly (improper fasteners,
        inadequate underlayment), or when a re-roofing project requires structural
        modification that makes a full tear-off necessary.

    - q: "Is slate roofing available in my area?"
      a: |
        Pro Exteriors installs natural slate roofing across Texas, Colorado, Kansas,
        Missouri, and Georgia. Availability in your specific area depends on whether
        your project scope and property type make slate a viable installation —
        which the structural assessment determines. We do not limit slate work to
        specific metro areas within our served states; the constraint is structural
        feasibility and project scope, not geography.

