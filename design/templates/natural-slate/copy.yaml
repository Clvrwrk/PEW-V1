process:
  id: "structural"
  eyebrow: "THE INSTALLATION PROCESS"
  h2: "Structural Feasibility First. Everything Else Follows."
  steps:
    - number: 1
      title: "Structural Feasibility Assessment"
      body: "Natural slate runs 14–18 lbs per square foot. A Pro Exteriors inspector evaluates your roof framing, rafter span and sizing, and decking condition to determine whether your structure can carry the load as-is, what reinforcement is required, or whether the structural investment required makes natural slate impractical on your specific home. This assessment is the gatekeeping step. We tell you the honest answer — including 'natural slate is not viable here, and here's why.'"
      icon: "search"
    - number: 2
      title: "Slate Selection and Sourcing"
      body: "Hard slate from Vermont or Pennsylvania, soft slate from Virginia or international deposits, or synthetic slate if the structural assessment rules out natural weight. Profile, color, and thickness selection. If you have specific slate variety preferences (a historic restoration matching original material, for example), we work with specialist quarry suppliers. Lead times on natural slate can run 6–12 weeks depending on the deposit and quantity — this factors into the project timeline."
      icon: "mountain"
    - number: 3
      title: "Specialist Installation"
      body: "Natural slate fastening is not the same as asphalt installation. Each slate tile is individually fastened with corrosion-resistant copper or stainless nails to the decking — the fastening pattern, nail length, and head exposure are determined by the slate thickness and your wind zone. Flashings at valleys, chimneys, and penetrations are hand-formed copper (the industry standard for slate installations that will outlast the rest of the building). Ridge caps are hand-cut from the same material."
      icon: "hard-hat"
    - number: 4
      title: "Inspection and Warranty"
      body: "Pro Exteriors photographs every section of the completed installation — ridge to eave, valley to valley. Your documentation package includes the structural assessment report, the slate sourcing specification, and the installation record. Manufacturer warranty registration is completed by our team where applicable. Natural slate is warranted by the stone itself — properly installed, it simply does not fail within its expected lifespan under normal weather conditions."
      icon: "check-circle"

