structural_weight_gate:
  severity: critical
  rule: |
    Natural slate is one of the heaviest roofing materials (14–18 lbs/sq ft —
    heavier than clay tile at 9–12 lbs/sq ft, and 5–9× asphalt at 2–4 lbs/sq ft).
    Page MUST be explicit that not every home can support natural slate without
    structural reinforcement. The feasibility assessment CTA is the conversion
    mechanism AND the lead pre-qualifier — homeowners who can't support slate
    are identified early. Do not downplay this or frame it as a bureaucratic step.
    It is the single most important piece of information a prospective slate customer
    needs before any project discussion.

synthetic_slate_gate:
  severity: info
  rule: |
    The materials grid includes synthetic slate as a legitimate option for homes
    that can't support natural weight. Confirm with Chris that Pro Exteriors actually
    installs synthetic slate before this ships. If they don't, remove the synthetic
    card from the materials grid. Do not advertise a service not offered.

