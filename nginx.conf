# Pro Exteriors website — runtime nginx config.
# Replaces the default site definition shipped with nginx:alpine.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Astro builds emit dir/index.html for every route. Resolve clean URLs
    # without the trailing slash (e.g. /commercial-roofing/tpo) by trying the
    # path verbatim, then with /index.html appended, before falling back to
    # the branded 404 page.
    location / {
        try_files $uri $uri/ $uri/index.html /404.html;
    }

    # GBP/workbook canon expects /sitemap.xml while Astro emits
    # sitemap-index.xml. Serve the generated index at the canonical alias.
    location = /sitemap.xml {
        try_files /sitemap-index.xml =404;
    }

    # Long cache for hashed Astro assets, no cache for HTML so deploys are
    # picked up immediately.
    location /_astro/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;

    # Hide nginx version in headers
    server_tokens off;
}
